<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Vezes Em Que Eu Te Vi 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0a10;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden}

#loading{position:fixed;inset:0;z-index:9999;background:#1a0a10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s}
#loading.gone{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top-color:#da291c;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Bebas Neue';color:rgba(255,255,255,.3);letter-spacing:5px;font-size:.9rem}

/* CAPA */
#capa{position:fixed;inset:0;z-index:8000;background:radial-gradient(ellipse at 32% 22%,#8b2035,#3d0a15 55%,#1a0508);display:flex;align-items:center;justify-content:center;transition:opacity 1s,transform 1s}
#capa.gone{opacity:0;pointer-events:none;transform:scale(1.04)}
.capa-inner{background:#fdf6ec;padding:48px 64px;border:12px solid #a3cc3a;box-shadow:0 0 0 3px #6c1d33,28px 28px 0 rgba(0,0,0,.55);text-align:center;transform:rotate(-1.8deg);position:relative;max-width:440px}
.capa-inner::before{content:'';position:absolute;inset:8px;border:2px solid rgba(108,29,51,.15);pointer-events:none}
.capa-edicao{display:inline-block;background:#da291c;color:#fff;font-size:.58rem;font-weight:900;letter-spacing:7px;text-transform:uppercase;padding:4px 14px;margin-bottom:18px}
.capa-titulo{font-family:'Bebas Neue';font-size:clamp(3rem,8vw,5.2rem);color:#6c1d33;line-height:.88}
.capa-linha{width:52px;height:4px;background:#a3cc3a;margin:18px auto}
.capa-sub{font-size:.65rem;font-weight:900;letter-spacing:4px;color:#bbb;text-transform:uppercase}
.btn-abrir{display:block;margin:26px auto 0;background:#6c1d33;color:#fff;border:none;padding:15px 50px;font-family:'Bebas Neue';font-size:1.45rem;letter-spacing:4px;cursor:pointer;border-bottom:6px solid #3d0a15;border-right:3px solid #3d0a15;transition:.1s;border-radius:2px}
.btn-abrir:active{transform:translate(2px,4px);border-bottom-width:2px}

/* APP */
#app{display:flex;align-items:center;justify-content:center;gap:14px;width:100vw;height:100vh;padding:14px}

/* LIVRO */
#livro{display:flex;height:min(700px,88vh);width:min(880px,68vw);border-radius:4px;box-shadow:-6px 0 20px rgba(0,0,0,.4),6px 0 20px rgba(0,0,0,.4),0 40px 80px rgba(0,0,0,.85);overflow:hidden;position:relative;flex-shrink:0}
#livro::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:10px;transform:translateX(-50%);background:linear-gradient(to right,rgba(0,0,0,.04),rgba(0,0,0,.28) 50%,rgba(0,0,0,.04));z-index:100;pointer-events:none}

/* PÁGINA ESQUERDA — fundo sólido do tema */
#pag-esq{width:50%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:26px 22px 20px}

.pg-titulo{position:relative;z-index:10;margin-bottom:20px}
.pg-titulo h2{font-family:'Bebas Neue';font-size:clamp(2.6rem,5vw,3.8rem);color:#fff;line-height:1;letter-spacing:1px}

/* Ilustrações decorativas — ATRÁS dos slots */
.ilus-wrap{position:absolute;inset:0;z-index:1;pointer-events:none}
.ilus-svg{position:absolute;filter:drop-shadow(2px 4px 8px rgba(0,0,0,.35))}

/* Slots na esquerda — z-index:2 para ficar na frente das ilustrações */
.slots-esq{position:absolute;inset:0;z-index:2}

/* PÁGINA DIREITA — canvas geométrico + slots por cima */
#pag-dir{width:50%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:20px 18px 16px}
#canvas-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0}

.dir-topo{position:relative;z-index:10;display:flex;justify-content:flex-end;margin-bottom:8px}
.pg-counter{font-family:'Bebas Neue';font-size:.75rem;letter-spacing:4px;color:rgba(255,255,255,.8)}
.slots-dir{position:absolute;inset:0;z-index:10}

.dir-nav{position:absolute;bottom:16px;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-nav{border:none;padding:9px 18px;font-family:'Bebas Neue';font-size:.88rem;letter-spacing:2px;cursor:pointer;border-radius:3px;border-bottom:4px solid;transition:.1s}
.btn-nav:active{transform:translateY(3px);border-bottom-width:1px}
.btn-prev{background:#0056b8;color:#fff;border-bottom-color:#003a80}
.btn-capa{background:#6c1d33;color:#fff;border-bottom-color:#3d0a15}
.btn-next{background:#a3cc3a;color:#111;border-bottom-color:#72931f}

/* ── SLOT ── */
/* O slot é um container branco; a imagem dentro respeita orientação */
.slot{
  position:absolute;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  transition:box-shadow .2s,transform .15s;
  box-shadow:4px 8px 24px rgba(0,0,0,.45);
}
.slot.vazio{border:none}
.slot.drop-over{box-shadow:0 0 0 4px #a3cc3a,4px 8px 24px rgba(0,0,0,.45)!important;transform:scale(1.03) rotate(0deg)!important}
.slot-num{font-family:'Bebas Neue';color:rgba(0,0,0,.2);font-size:clamp(1rem,2.5vw,1.8rem);user-select:none}

/* Imagem colada — contain para respeitar orientação */
.slot-img{
  width:100%;height:100%;
  object-fit:contain;   /* respeita proporção da imagem */
  display:block;
  background:#fff;
}
/* Border estilo álbum */
.slot.cheio .slot-img{
  padding:5px;
  box-shadow:inset 0 0 0 5px #fff;
}

/* Especiais */
.slot.especial::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(120deg,rgba(255,215,0,.3) 0%,rgba(255,100,200,.2) 33%,rgba(80,220,255,.2) 66%,rgba(255,215,0,.3) 100%);
  background-size:300% auto;animation:holo 2.5s linear infinite;mix-blend-mode:overlay;
}
@keyframes holo{0%{background-position:0% center}100%{background-position:300% center}}

/* SIDEBAR */
#sidebar{display:flex;flex-direction:column;gap:12px;width:min(215px,20vw);height:min(700px,88vh);flex-shrink:0}

#btn-pack{
  background:linear-gradient(135deg,#da291c,#8b0000);
  color:#fff;border:none;padding:15px 10px;
  font-family:'Bebas Neue';font-size:1.15rem;letter-spacing:3px;
  cursor:pointer;border-radius:6px;border-bottom:5px solid #5c0000;
  box-shadow:0 8px 24px rgba(218,41,28,.38);transition:.1s;text-align:center;
}
#btn-pack:active{transform:translateY(3px);border-bottom-width:2px;box-shadow:none}

/* Dispensário acrílico — igual referência */
#dispensario{
  flex:1;
  background:linear-gradient(160deg,rgba(80,10,30,.85),rgba(50,5,18,.95));
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.3),0 18px 40px rgba(0,0,0,.6);
  padding:14px 10px;
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* Reflexo acrílico no topo */
#dispensario::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 100%);
  border-radius:10px 10px 0 0;pointer-events:none;z-index:0;
}

.disp-topo{
  position:relative;z-index:1;
  margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.1);text-align:center;
}
.disp-sup{display:block;font-size:.44rem;font-weight:900;letter-spacing:5px;color:rgba(255,255,255,.38);text-transform:uppercase}
.disp-titulo{display:block;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:3px;color:rgba(255,255,255,.9)}

#inv-scroll{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:7px;
  padding:2px;position:relative;z-index:1;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.inv-vazio{color:rgba(255,255,255,.25);font-size:.7rem;text-align:center;padding:24px 8px;line-height:2}

/* Card do inventário — estilo figurinha empilhada */
.inv-card{
  background:#fff;
  border-radius:3px;
  display:flex;align-items:center;gap:0;
  cursor:grab;
  box-shadow:0 3px 12px rgba(0,0,0,.5);
  transition:transform .15s,box-shadow .15s;
  user-select:none;flex-shrink:0;overflow:hidden;
  border-left:4px solid transparent;
}
.inv-card:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 7px 20px rgba(0,0,0,.6)}
.inv-card.arrastando{opacity:.4;cursor:grabbing}

/* Thumb da figurinha no inventário */
.inv-thumb-wrap{width:48px;height:58px;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.inv-thumb{width:100%;height:100%;object-fit:contain;display:block}

.inv-info{flex:1;min-width:0;padding:5px 7px}
.inv-num{font-family:'Bebas Neue';font-size:.95rem;color:#222;line-height:1}
.inv-tema{font-size:.5rem;font-weight:900;color:#999;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;font-size:.42rem;font-weight:900;padding:1px 5px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.badge-dup{background:rgba(255,150,0,.15);color:#c96000}
.badge-esp{background:linear-gradient(90deg,#f7971e,#ffd200);color:#333}

/* Cor da borda esquerda do card por tema */
.inv-card.t-Comendo{border-left-color:#da291c}
.inv-card.t-Brincando{border-left-color:#0056b8}
.inv-card.t-Cuidando{border-left-color:#3a9a3a}
.inv-card.t-Explorando{border-left-color:#8b2035}
.inv-card.t-Brindando{border-left-color:#c5a059}
.inv-card.t-Sofrendo{border-left-color:#0096cc}
.inv-card.t-Especiais{border-left-color:#ffd700}

/* PACOTE */
#pack-overlay{display:none;position:fixed;inset:0;z-index:7000;background:rgba(8,3,10,.95);flex-direction:column;align-items:center;justify-content:center;gap:26px}
#pack-overlay.show{display:flex}
.envelope{width:185px;height:255px;background:linear-gradient(150deg,#8b2035,#3d0a15);border-radius:8px;border:2px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:0 20px 60px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.12);animation:flutua 2.2s ease-in-out infinite;position:relative;overflow:hidden}
.envelope::before{content:'';position:absolute;top:0;left:0;right:0;height:36%;background:linear-gradient(150deg,#a33040,#6b1025);border-bottom:2px dashed rgba(255,255,255,.18)}
@keyframes flutua{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
.env-icone{font-size:2.5rem;position:relative;z-index:1}
.env-label{font-family:'Bebas Neue';font-size:1.7rem;letter-spacing:4px;color:rgba(255,255,255,.85);position:relative;z-index:1;text-align:center;line-height:1}
.env-dica{color:rgba(255,255,255,.4);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;animation:pisca 1.8s ease-in-out infinite}
@keyframes pisca{0%,100%{opacity:.3}50%{opacity:1}}
.envelope.rasgando{animation:rasgar .5s forwards}
@keyframes rasgar{0%{transform:rotate(-2deg) scale(1)}30%{transform:rotate(6deg) scale(1.07)}60%{transform:rotate(-9deg) scale(.93)}100%{transform:scale(0) rotate(0) translateY(-80px);opacity:0}}

.reveal-row{display:none;flex-wrap:wrap;justify-content:center;gap:16px}
.reveal-row.show{display:flex}
.reveal-card{background:#fff;padding:6px;border-radius:4px;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.7);animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;display:flex;flex-direction:column;align-items:center}
.reveal-card:nth-child(2){animation-delay:.15s}
.reveal-card:nth-child(3){animation-delay:.3s}
@keyframes popIn{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.reveal-card.especial{background:#0d0d20;border:2px solid #ffd700;box-shadow:0 0 28px rgba(255,215,0,.22),0 18px 40px rgba(0,0,0,.7)}
.reveal-card.especial::after{content:'✨ ESPECIAL ✨';display:block;font-size:.48rem;font-weight:900;letter-spacing:2px;color:#ffd700;margin-top:3px}

/* Imagem no reveal também usa contain */
.reveal-img-wrap{width:110px;height:140px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;overflow:hidden}
.reveal-card.especial .reveal-img-wrap{background:#1a1a30}
.reveal-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.reveal-num{font-family:'Bebas Neue';font-size:1.2rem;margin-top:4px;color:#333}
.especial .reveal-num{color:#ffd700}

#btn-guardar{display:none;background:#a3cc3a;color:#111;border:none;padding:14px 42px;font-family:'Bebas Neue';font-size:1.25rem;letter-spacing:3px;cursor:pointer;border-radius:4px;border-bottom:4px solid #72931f;transition:.1s}
#btn-guardar.show{display:block}
#btn-guardar:active{transform:translateY(3px);border-bottom-width:1px}

/* TROFÉU */
#trofeu-modal{display:none;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.97);flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer}
#trofeu-modal.show{display:flex}
.trofeu-icon{font-size:5.5rem;animation:tpop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes tpop{from{transform:scale(0) translateY(60px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.trofeu-titulo{font-family:'Bebas Neue';font-size:3rem;color:#a3cc3a;letter-spacing:6px}
.trofeu-voucher{background:#fff;padding:22px 36px;border-radius:6px;border:4px solid #ffd700;font-weight:700;font-size:1.05rem;text-align:center;max-width:460px;color:#333;line-height:1.5}
.trofeu-dica{color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="load-txt">Carregando memórias...</div></div>

<div id="capa">
  <div class="capa-inner">
    <span class="capa-edicao">✦ Edição Especial ✦</span>
    <h1 class="capa-titulo">29 Vezes<br>Em Que<br>Eu Te Vi</h1>
    <div class="capa-linha"></div>
    <p class="capa-sub">Álbum de Figurinhas</p>
    <button class="btn-abrir" onclick="abrirAlbum()">Abrir Álbum ✦</button>
  </div>
</div>

<div id="app">
  <div id="livro">
    <div id="pag-esq">
      <div class="pg-titulo"><h2 id="h-titulo">—</h2></div>
      <div class="ilus-wrap" id="ilus-wrap"></div>
      <div class="slots-esq" id="slots-esq"></div>
    </div>
    <div id="pag-dir">
      <canvas id="canvas-bg"></canvas>
      <div class="dir-topo"><span class="pg-counter" id="pg-counter">1/7</span></div>
      <div class="slots-dir" id="slots-dir"></div>
      <div class="dir-nav">
        <button class="btn-nav btn-prev" onclick="virar(-1)">← Anterior</button>

        <button class="btn-nav btn-next" onclick="virar(1)">Próxima →</button>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <button id="btn-pack" onclick="abrirPacote()">🎁 Abrir Pacote (+3)</button>
    <div id="dispensario">
      <div class="disp-topo">
        <span class="disp-sup">Dispensário de</span>
        <span class="disp-titulo">Memórias</span>
      </div>
      <div id="inv-scroll">
        <div class="inv-vazio" id="inv-vazio">Abra pacotes para<br>receber figurinhas! 🎴</div>
      </div>
    </div>
  </div>
</div>

<div id="pack-overlay">
  <div class="envelope" id="envelope" onclick="rasgar()">
    <span class="env-icone">🎴</span>
    <span class="env-label">NOVO<br>PACOTE</span>
  </div>
  <div class="env-dica" id="env-dica">Toque para rasgar o pacote</div>
  <div class="reveal-row" id="reveal-row"></div>
  <button id="btn-guardar" onclick="guardar()">Guardar Figurinhas ✓</button>
</div>

<div id="trofeu-modal" onclick="fecharTrofeu()">
  <div class="trofeu-icon">🏆</div>
  <div class="trofeu-titulo">PÁGINA COMPLETA!</div>
  <div class="trofeu-voucher" id="trofeu-voucher"></div>
  <div class="trofeu-dica">Toque para continuar</div>
</div>

/* ══════════════════════════════════════
   CARREGAR PLANILHA
══════════════════════════════════════ */
async function carregarDados() {
  try {
    const res  = await fetch(SHEET_URL);
    const txt  = await res.text();
    const json = JSON.parse(txt.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    figuras = json.table.rows
      .filter(r => r.c[0]?.v != null)
      .map(r => ({
        id:    Number(r.c[0].v),
        tema:  String(r.c[1]?.v || '').trim(),
        url:   String(r.c[2]?.v || '').trim(),
        texto: String(r.c[3]?.v || '').trim(),
      }));
    document.getElementById('loading').classList.add('gone');
    renderPagina();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f87171;font-family:Nunito;text-align:center;padding:30px;max-width:320px">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <strong>Erro ao carregar dados</strong><br><br>
        <small style="opacity:.6">${e.message}</small><br><br>
        <small style="opacity:.4">Planilha precisa estar pública:<br>Compartilhar → Qualquer pessoa com o link</small>
      </div>`;
  }
}

function abrirAlbum()  { document.getElementById('capa').classList.add('gone') }
function voltarCapa()  { document.getElementById('capa').classList.remove('gone') }

  const W = dir.offsetWidth  || 440;
  const H = dir.offsetHeight || 700;
  canvas.width  = W;
  canvas.height = H;
  const ctx   = canvas.getContext('2d');
  const cores = tema.corDir;

  ctx.fillStyle = cores[0];
  ctx.fillRect(0, 0, W, H);

  const chevrH = H * 0.56;
  const sz = 46;
  for (let row = -1; row < Math.ceil(chevrH / sz) + 2; row++) {
    for (let col = -1; col < Math.ceil(W / sz) + 2; col++) {
      ctx.fillStyle = cores[Math.abs((row + col) % cores.length)];
      ctx.beginPath();
      ctx.moveTo(col * sz, row * sz);
      ctx.lineTo((col + 1) * sz, row * sz);
      ctx.lineTo(col * sz + sz / 2, row * sz + sz * 0.54);
      ctx.closePath();
      ctx.fill();
    }
  }

  const px = 19;
  const startRow = Math.floor(chevrH / px);
  for (let row = startRow; row < Math.ceil(H / px) + 1; row++) {
    for (let col = 0; col < Math.ceil(W / px) + 1; col++) {
      ctx.fillStyle = cores[Math.abs((row * 3 + col * 2) % cores.length)];
      ctx.fillRect(col * px, row * px, px - 1, px - 1);
    }
  }
}

/* ══════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════ */
function renderPagina() {
  const t = TEMAS[pagAtual];

  document.getElementById('pag-esq').style.background  = t.corEsq;
  document.getElementById('h-titulo').textContent      = t.nome.toUpperCase();
  document.getElementById('pg-counter').textContent    = `${pagAtual + 1} / ${TEMAS.length}`;

  setTimeout(() => desenharCanvas(t), 30);

  /* Ilustrações — ATRÁS */
  const ilusWrap = document.getElementById('ilus-wrap');
  ilusWrap.innerHTML = '';
  (ILUS[t.nome] || []).forEach(il => {
    const div = document.createElement('div');
    div.className = 'ilus-svg';
    div.style.cssText = `top:${il.top};left:${il.left};width:${il.w};transform:rotate(${il.rot})`;
    div.innerHTML = il.svg;
    ilusWrap.appendChild(div);
  });

  /* Slots */
  const sEsq = document.getElementById('slots-esq');
  const sDir = document.getElementById('slots-dir');
  sEsq.innerHTML = '';
  sDir.innerHTML = '';

  t.slotsEsq.forEach(s => criarSlot(sEsq, s, t));
  t.slotsDir.forEach(s => criarSlot(sDir, s, t));

  renderInv();
}

/* ══════════════════════════════════════
   CRIAR SLOT — imagem com contain
══════════════════════════════════════ */
function criarSlot(container, s, tema) {
  const fig      = figuras.find(f => f.id === s.id);
  const jaColado = colado.includes(s.id);
  const especial = tema.nome === 'Especiais';

  const div = document.createElement('div');
  div.className = 'slot' + (jaColado ? ' cheio' + (especial ? ' especial' : '') : ' vazio');
  div.dataset.id = s.id;
  div.style.cssText =
    `top:${s.top};left:${s.left};width:${s.w};height:${s.h};` +
    `transform:rotate(${s.rot || '0deg'});`;

  if (jaColado && fig?.url) {
    // Usa object-fit:contain para respeitar orientação da imagem
    const img = document.createElement('img');
    img.className = 'slot-img';
    img.src = fig.url;
    img.alt = `Figurinha ${s.id}`;
    div.appendChild(img);
  } else if (jaColado) {
    const num = document.createElement('span');
    num.className = 'slot-num';
    num.textContent = s.id;
    div.appendChild(num);
  } else {
    const num = document.createElement('span');
    num.className = 'slot-num';
    num.textContent = s.id;
    div.appendChild(num);

    div.addEventListener('dragover',  e => { e.preventDefault(); div.classList.add('drop-over') });
    div.addEventListener('dragleave', () => div.classList.remove('drop-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drop-over');
      if (parseInt(e.dataTransfer.getData('fig-id')) === s.id) colar(s.id);
    });
    div.addEventListener('click', () => { if (inv.includes(s.id)) colar(s.id) });
  }
  container.appendChild(div);
}

/* ══════════════════════════════════════
   INVENTÁRIO
══════════════════════════════════════ */
function renderInv() {
  const scroll = document.getElementById('inv-scroll');
  const vazio  = document.getElementById('inv-vazio');
  scroll.querySelectorAll('.inv-card').forEach(el => el.remove());

  if (inv.length === 0) { vazio.style.display = 'block'; return }
  vazio.style.display = 'none';

  const cnt = {};
  inv.forEach(id => cnt[id] = (cnt[id] || 0) + 1);
  [...new Set(inv)].forEach(id => {
    const fig      = figuras.find(f => f.id === id);
    if (!fig) return;
    const especial  = fig.tema === 'Especiais';
    const qtd       = cnt[id];
    const temaNome  = TEMAS.find(t => t.ids.includes(id))?.nome || '';

    const card = document.createElement('div');
    card.className = `inv-card t-${fig.tema}`;
    card.draggable  = true;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('fig-id', id);
      card.classList.add('arrastando');
    });
    card.addEventListener('dragend', () => card.classList.remove('arrastando'));

    /* Thumb — contain também no inventário */
    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'inv-thumb-wrap';
    const thumb = document.createElement('img');
    thumb.className = 'inv-thumb';
    thumb.src = fig.url;
    thumb.alt = `#${id}`;
    thumbWrap.appendChild(thumb);

    const info = document.createElement('div');
    info.className = 'inv-info';
    info.innerHTML =
      `<div class="inv-num">#${id}</div>` +
      `<div class="inv-tema">${temaNome}</div>` +
      (qtd > 1 ? `<span class="badge badge-dup">×${qtd}</span>` : '') +
      (especial ? `<span class="badge badge-esp">✨ Especial</span>` : '');

    card.append(thumbWrap, info);
    scroll.appendChild(card);
  });
}

/* ══════════════════════════════════════
   COLAR
══════════════════════════════════════ */
function colar(id) {
  if (colado.includes(id)) return;
  const idx = inv.indexOf(id);
  if (idx === -1) return;
  inv.splice(idx, 1);
  colado.push(id);
  salvar();
  renderPagina();
  const t = TEMAS[pagAtual];
  if (t.ids.every(i => colado.includes(i))) setTimeout(mostrarTrofeu, 700);
}

/* ══════════════════════════════════════
   PACOTE
══════════════════════════════════════ */
function abrirPacote() {
  const env = document.getElementById('envelope');
  env.classList.remove('rasgando');
  env.style.display = 'flex';
  document.getElementById('env-dica').style.display = 'block';
  document.getElementById('reveal-row').classList.remove('show');
  document.getElementById('reveal-row').innerHTML = '';
  document.getElementById('btn-guardar').classList.remove('show');
  document.getElementById('pack-overlay').classList.add('show');
}

function rasgar() {
  const env = document.getElementById('envelope');
  if (env.classList.contains('rasgando')) return;
  const faltando = figuras.filter(f => !colado.includes(f.id) && !inv.includes(f.id)).map(f => f.id);
  const pool  = faltando.length > 0 ? faltando : figuras.map(f => f.id);
  const copia = [...pool];
  pendentes   = [];
  for (let i = 0; i < 3; i++) {
    if (!copia.length) break;
    const r = Math.floor(Math.random() * copia.length);
    pendentes.push(copia.splice(r, 1)[0]);
  }
  env.classList.add('rasgando');
  document.getElementById('env-dica').style.display = 'none';
  setTimeout(() => { env.style.display = 'none'; mostrarReveal() }, 520);
}

function mostrarReveal() {
  const row = document.getElementById('reveal-row');
  row.innerHTML = '';
  pendentes.forEach(id => {
    const fig  = figuras.find(f => f.id === id);
    if (!fig) return;
    const esp  = fig.tema === 'Especiais';
    const card = document.createElement('div');
    card.className = 'reveal-card' + (esp ? ' especial' : '');

    const wrap = document.createElement('div');
    wrap.className = 'reveal-img-wrap';
    const img  = document.createElement('img');
    img.className = 'reveal-img';
    img.src = fig.url; img.alt = `#${id}`;
    wrap.appendChild(img);

    const num  = document.createElement('div');
    num.className = 'reveal-num'; num.textContent = '#' + id;
    card.append(wrap, num);
    row.appendChild(card);
  });
  row.classList.add('show');
  document.getElementById('btn-guardar').classList.add('show');
}

function guardar() {
  pendentes.forEach(id => inv.push(id));
  salvar(); renderInv();
  document.getElementById('pack-overlay').classList.remove('show');
  pendentes = [];
}

/* ══════════════════════════════════════
   TROFÉU
══════════════════════════════════════ */
function mostrarTrofeu() {
  const t   = TEMAS[pagAtual];
  const fig = figuras.find(f => f.id === t.ids[0]);
  document.getElementById('trofeu-voucher').textContent = fig?.texto || '🎉 Página completa!';
  document.getElementById('trofeu-modal').classList.add('show');
}
function fecharTrofeu() { document.getElementById('trofeu-modal').classList.remove('show') }

/* ══════════════════════════════════════
   NAV + SAVE
══════════════════════════════════════ */
function virar(dir) {
  const n = pagAtual + dir;
  if (n >= 0 && n < TEMAS.length) { pagAtual = n; renderPagina() }
}
function salvar() {
  localStorage.setItem('alb5_inv',    JSON.stringify(inv));
  localStorage.setItem('alb5_colado', JSON.stringify(colado));
}

window.addEventListener('load',   carregarDados);
window.addEventListener('resize', () => { if (TEMAS[pagAtual]) desenharCanvas(TEMAS[pagAtual]) });
</script>
