<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Vezes Em Que Eu Te Vi 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0a10;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden}

#loading{position:fixed;inset:0;z-index:9999;background:#1a0a10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s}
#loading.gone{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top-color:#da291c;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Bebas Neue';color:rgba(255,255,255,.3);letter-spacing:5px;font-size:.9rem}

/* CAPA */
#capa{position:fixed;inset:0;z-index:8000;background:radial-gradient(ellipse at 32% 22%, #8b2035 0%, #3d0a15 55%, #1a0508 100%);display:flex;align-items:center;justify-content:center;transition:opacity 1s ease,transform 1s ease}
#capa.gone{opacity:0;pointer-events:none;transform:scale(1.04)}
.capa-inner{background:#fdf6ec;padding:50px 66px;border:12px solid #a3cc3a;box-shadow:0 0 0 3px #6c1d33,30px 30px 0 rgba(0,0,0,.55);text-align:center;transform:rotate(-1.8deg);position:relative;z-index:1;max-width:450px}
.capa-inner::before{content:'';position:absolute;inset:8px;border:2px solid rgba(108,29,51,.15);pointer-events:none}
.capa-edicao{display:inline-block;background:#da291c;color:#fff;font-size:.58rem;font-weight:900;letter-spacing:7px;text-transform:uppercase;padding:4px 16px;margin-bottom:20px}
.capa-titulo{font-family:'Bebas Neue';font-size:clamp(3rem,9vw,5.5rem);color:#6c1d33;line-height:.88}
.capa-linha{width:56px;height:4px;background:#a3cc3a;margin:20px auto}
.capa-sub{font-size:.68rem;font-weight:900;letter-spacing:4px;color:#aaa;text-transform:uppercase}
.btn-abrir{display:block;margin:28px auto 0;background:#6c1d33;color:#fff;border:none;padding:16px 52px;font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:4px;cursor:pointer;border-bottom:6px solid #3d0a15;border-right:3px solid #3d0a15;transition:.1s;border-radius:2px}
.btn-abrir:active{transform:translate(2px,4px);border-bottom-width:2px}

/* APP */
#app{display:flex;align-items:center;justify-content:center;gap:16px;width:100vw;height:100vh;padding:16px}

/* LIVRO */
#livro{display:flex;height:min(700px,88vh);width:min(880px,68vw);border-radius:4px;box-shadow:-6px 0 20px rgba(0,0,0,.4),6px 0 20px rgba(0,0,0,.4),0 40px 80px rgba(0,0,0,.85);overflow:hidden;position:relative;flex-shrink:0}
#livro::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:10px;transform:translateX(-50%);background:linear-gradient(to right,rgba(0,0,0,.04),rgba(0,0,0,.28) 50%,rgba(0,0,0,.04));z-index:100;pointer-events:none}

.pagina{width:50%;height:100%;position:relative;overflow:hidden}

/* PG ESQUERDA */
#pag-esq{display:flex;flex-direction:column;padding:28px 26px 22px}
.titulo-bloco{position:relative;z-index:10;margin-bottom:6px}
.titulo-bloco h2{font-family:'Bebas Neue';font-size:clamp(2.4rem,5vw,3.6rem);color:#fff;line-height:.95;letter-spacing:1px}
.titulo-bloco .sub{font-size:.62rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:4px}
.zona{position:relative;flex:1}

/* Ilustrações SVG */
.ilus-svg{position:absolute;pointer-events:none;z-index:5;filter:drop-shadow(2px 4px 10px rgba(0,0,0,.4))}

/* SLOTS */
.slot{position:absolute;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';color:rgba(0,0,0,.22);font-size:clamp(.9rem,2vw,1.6rem);overflow:hidden;cursor:default;transition:box-shadow .2s,transform .15s}
.slot.vazio{border:none;box-shadow:4px 8px 22px rgba(0,0,0,.45)}
.slot.cheio{box-shadow:4px 10px 26px rgba(0,0,0,.5)}
.slot.drop-over{box-shadow:0 0 0 3px #a3cc3a,4px 8px 22px rgba(0,0,0,.45)!important;transform:scale(1.04) rotate(0deg)!important}
.slot img{width:100%;height:100%;object-fit:cover;display:block;border:5px solid #fff}
.slot.especial-colado img{border-color:#ffd700}
.slot.especial-colado::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,215,0,.28) 0%,rgba(255,80,200,.18) 33%,rgba(80,220,255,.18) 66%,rgba(255,215,0,.28) 100%);background-size:300% auto;animation:holo 2.5s linear infinite;mix-blend-mode:overlay}
@keyframes holo{0%{background-position:0% center}100%{background-position:300% center}}

/* PG DIREITA */
#pag-dir{display:flex;flex-direction:column;padding:22px 18px 16px}
#canvas-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.dir-topo{position:relative;z-index:10;display:flex;justify-content:flex-end;margin-bottom:10px}
.pg-counter{font-family:'Bebas Neue';font-size:.78rem;letter-spacing:4px;color:rgba(255,255,255,.75)}
.zona-dir{position:relative;z-index:10;flex:1}
.dir-nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.btn-nav{border:none;padding:9px 18px;font-family:'Bebas Neue';font-size:.88rem;letter-spacing:2px;cursor:pointer;border-radius:3px;border-bottom:4px solid;transition:.1s}
.btn-nav:active{transform:translateY(3px);border-bottom-width:1px}
.btn-prev{background:#0056b8;color:#fff;border-bottom-color:#003a80}
.btn-capa{background:#6c1d33;color:#fff;border-bottom-color:#3d0a15}
.btn-next{background:#a3cc3a;color:#111;border-bottom-color:#72931f}

/* SIDEBAR */
#sidebar{display:flex;flex-direction:column;gap:12px;width:min(220px,21vw);height:min(700px,88vh);flex-shrink:0}
#btn-pack{background:linear-gradient(135deg,#da291c,#8b0000);color:#fff;border:none;padding:16px 10px;font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:3px;cursor:pointer;border-radius:6px;border-bottom:5px solid #5c0000;box-shadow:0 8px 24px rgba(218,41,28,.38);transition:.1s;text-align:center}
#btn-pack:active{transform:translateY(3px);border-bottom-width:2px;box-shadow:none}
#dispensario{flex:1;background:linear-gradient(160deg,rgba(255,255,255,.11),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(20px);border-radius:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 18px 40px rgba(0,0,0,.55);padding:14px;display:flex;flex-direction:column;overflow:hidden}
.disp-topo{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.disp-sup{display:block;font-size:.48rem;font-weight:900;letter-spacing:5px;color:rgba(255,255,255,.38);text-transform:uppercase}
.disp-titulo{display:block;font-family:'Bebas Neue';font-size:1.12rem;letter-spacing:3px;color:#fff}
#inv-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:2px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
.inv-vazio{color:rgba(255,255,255,.26);font-size:.72rem;text-align:center;padding:28px 8px;line-height:2}
.inv-card{background:#fff;border-radius:4px;padding:5px;display:flex;align-items:center;gap:8px;cursor:grab;box-shadow:0 4px 14px rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s;user-select:none;flex-shrink:0}
.inv-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.6)}
.inv-card.arrastando{opacity:.4;cursor:grabbing}
.inv-thumb{width:40px;height:53px;object-fit:cover;border:3px solid #fff;box-shadow:2px 2px 5px rgba(0,0,0,.18);border-radius:2px;flex-shrink:0;background:#eee}
.inv-thumb.especial{border-color:#ffd700}
.inv-info{flex:1;min-width:0}
.inv-num{font-family:'Bebas Neue';font-size:1rem;color:#222}
.inv-tema{font-size:.55rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;font-size:.45rem;font-weight:900;padding:2px 5px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.badge-dup{background:rgba(255,150,0,.15);color:#d46a00}
.badge-esp{background:linear-gradient(90deg,#f7971e,#ffd200);color:#333}

/* PACOTE */
#pack-overlay{display:none;position:fixed;inset:0;z-index:7000;background:rgba(8,3,10,.95);flex-direction:column;align-items:center;justify-content:center;gap:26px}
#pack-overlay.show{display:flex}
.envelope{width:185px;height:255px;background:linear-gradient(150deg,#8b2035,#3d0a15);border-radius:8px;border:2px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:0 20px 60px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.12);animation:flutua 2.2s ease-in-out infinite;position:relative;overflow:hidden}
.envelope::before{content:'';position:absolute;top:0;left:0;right:0;height:36%;background:linear-gradient(150deg,#a33040,#6b1025);border-bottom:2px dashed rgba(255,255,255,.18)}
@keyframes flutua{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
.env-icone{font-size:2.5rem;position:relative;z-index:1}
.env-label{font-family:'Bebas Neue';font-size:1.7rem;letter-spacing:4px;color:rgba(255,255,255,.85);position:relative;z-index:1;text-align:center;line-height:1}
.env-dica{color:rgba(255,255,255,.4);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;animation:pisca 1.8s ease-in-out infinite}
@keyframes pisca{0%,100%{opacity:.3}50%{opacity:1}}
.envelope.rasgando{animation:rasgar .5s forwards}
@keyframes rasgar{0%{transform:rotate(-2deg) scale(1)}30%{transform:rotate(6deg) scale(1.07)}60%{transform:rotate(-9deg) scale(.93)}100%{transform:scale(0) rotate(0) translateY(-80px);opacity:0}}
.reveal-row{display:none;flex-wrap:wrap;justify-content:center;gap:16px}
.reveal-row.show{display:flex}
.reveal-card{background:#fff;padding:6px;border-radius:4px;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.7);animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.reveal-card:nth-child(2){animation-delay:.15s}
.reveal-card:nth-child(3){animation-delay:.3s}
@keyframes popIn{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.reveal-card.especial{background:#0d0d20;border:2px solid #ffd700;box-shadow:0 0 28px rgba(255,215,0,.22),0 18px 40px rgba(0,0,0,.7)}
.reveal-card.especial::after{content:'✨ ESPECIAL ✨';display:block;font-size:.48rem;font-weight:900;letter-spacing:2px;color:#ffd700;margin-top:3px}
.reveal-img{width:100px;height:134px;object-fit:cover;border:4px solid #fff;display:block;background:#ddd}
.especial .reveal-img{border-color:#ffd700}
.reveal-num{font-family:'Bebas Neue';font-size:1.2rem;margin-top:4px;color:#333}
.especial .reveal-num{color:#ffd700}
#btn-guardar{display:none;background:#a3cc3a;color:#111;border:none;padding:14px 42px;font-family:'Bebas Neue';font-size:1.25rem;letter-spacing:3px;cursor:pointer;border-radius:4px;border-bottom:4px solid #72931f;transition:.1s}
#btn-guardar.show{display:block}
#btn-guardar:active{transform:translateY(3px);border-bottom-width:1px}

/* TROFÉU */
#trofeu-modal{display:none;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.97);flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer}
#trofeu-modal.show{display:flex}
.trofeu-icon{font-size:5.5rem;animation:tpop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes tpop{from{transform:scale(0) translateY(60px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.trofeu-titulo{font-family:'Bebas Neue';font-size:3rem;color:#a3cc3a;letter-spacing:6px}
.trofeu-voucher{background:#fff;padding:22px 36px;border-radius:6px;border:4px solid #ffd700;font-weight:700;font-size:1.05rem;text-align:center;max-width:460px;color:#333;line-height:1.5}
.trofeu-dica{color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:3px;text-transform:uppercase}
</style>
</head>

      {id:25,top:'50%',left:'8%',w:'80%',h:'36%',rot:'-1.2deg'},
    ],
  },
  {
    nome:'Especiais', sub:'Momentos Únicos', ids:[26,27,28,29],
    corEsq:'#1e1000', corDir:['#c5a059','#ffd700','#8b6020','#6c1d33'],
    slotsEsq:[
      {id:26,top:'10%',left:'3%',w:'56%',h:'36%',rot:'-1deg'},
      {id:27,top:'52%',left:'5%',w:'56%',h:'32%',rot:'1.2deg'},
    ],
    slotsDir:[
      {id:28,top:'6%',left:'6%',w:'83%',h:'38%',rot:'.8deg'},
      {id:29,top:'50%',left:'8%',w:'80%',h:'36%',rot:'-1deg'},
    ],
  },
];

// ─── ESTADO ──────────────────────────────────────────
let figuras  = [];
let inv      = JSON.parse(localStorage.getItem('alb4_inv')   || '[]');
let colado   = JSON.parse(localStorage.getItem('alb4_colado')|| '[]');
let pagAtual = 0;
let pendentes= [];

// ─── CARREGAR PLANILHA ────────────────────────────────
async function carregarDados() {
  try {
    const res  = await fetch(SHEET_URL);
    const txt  = await res.text();
    const json = JSON.parse(txt.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    figuras = json.table.rows
      .filter(r => r.c[0]?.v != null)
      .map(r => ({
        id:    Number(r.c[0].v),
        tema:  String(r.c[1]?.v || '').trim(),
        url:   String(r.c[2]?.v || '').trim(),
        texto: String(r.c[3]?.v || '').trim(),
      }));
    document.getElementById('loading').classList.add('gone');
    renderPagina();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f87171;font-family:Nunito;text-align:center;padding:30px;max-width:340px">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <strong>Erro ao carregar dados</strong><br><br>
        <small style="opacity:.6">${e.message}</small><br><br>
        <small style="opacity:.4">Planilha precisa estar pública:<br>Compartilhar → Qualquer pessoa com o link</small>
      </div>`;
  }
}

// ─── CAPA ─────────────────────────────────────────────
function abrirAlbum()  { document.getElementById('capa').classList.add('gone') }
function voltarCapa()  { document.getElementById('capa').classList.remove('gone') }

// ─── CANVAS GEOMÉTRICO ───────────────────────────────
function desenharCanvas(tema) {
  const canvas = document.getElementById('canvas-bg');
  const dir    = document.getElementById('pag-dir');
  const W = dir.offsetWidth  || 440;
  const H = dir.offsetHeight || 700;
  canvas.width  = W;
  canvas.height = H;
  const ctx   = canvas.getContext('2d');
  const cores = tema.corDir;

  ctx.fillStyle = cores[0];
  ctx.fillRect(0, 0, W, H);

  // Chevrons superiores
  const chevrH = H * 0.57;
  const sz = 44;
  for (let row = -1; row < Math.ceil(chevrH / sz) + 2; row++) {
    for (let col = -1; col < Math.ceil(W / sz) + 2; col++) {
      ctx.fillStyle = cores[Math.abs((row + col) % cores.length)];
      ctx.beginPath();
      ctx.moveTo(col * sz, row * sz);
      ctx.lineTo((col + 1) * sz, row * sz);
      ctx.lineTo(col * sz + sz / 2, row * sz + sz * 0.52);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Grade pixels inferior
  const px = 18;
  const startRow = Math.floor(chevrH / px);
  for (let row = startRow; row < Math.ceil(H / px) + 1; row++) {
    for (let col = 0; col < Math.ceil(W / px) + 1; col++) {
      ctx.fillStyle = cores[Math.abs((row * 3 + col * 2) % cores.length)];
      ctx.fillRect(col * px, row * px, px - 1, px - 1);
    }
  }
}

// ─── RENDER ──────────────────────────────────────────
function renderPagina() {
  const t = TEMAS[pagAtual];

  document.getElementById('pag-esq').style.background = t.corEsq;
  document.getElementById('h-titulo').textContent     = t.nome.toUpperCase();
  document.getElementById('h-sub').textContent        = t.sub;
  document.getElementById('pg-counter').textContent   = `${pagAtual + 1} / ${TEMAS.length}`;

  setTimeout(() => desenharCanvas(t), 30);

  // Limpa zonas
  const zonaEsq = document.getElementById('zona-esq');
  const zonaDir = document.getElementById('zona-dir');
  zonaEsq.innerHTML = '';
  zonaDir.innerHTML = '';

  // Ilustrações SVG temáticas
  const ilust = ILUS[t.nome] || [];
  ilust.forEach(il => {
    const wrap = document.createElement('div');
    wrap.className = 'ilus-svg';
    wrap.style.cssText = `top:${il.top};left:${il.left};width:${il.w};transform:rotate(${il.rot})`;
    wrap.innerHTML = il.svg;
    zonaEsq.appendChild(wrap);
  });

  // Slots
  t.slotsEsq.forEach(s => criarSlot(zonaEsq, s, t));
  t.slotsDir.forEach(s => criarSlot(zonaDir, s, t));

  renderInv();
}

function criarSlot(container, s, tema) {
  const fig      = figuras.find(f => f.id === s.id);
  const jaColado = colado.includes(s.id);
  const especial = tema.nome === 'Especiais';

  const div = document.createElement('div');
  div.className = 'slot ' + (jaColado
    ? 'cheio' + (especial ? ' especial-colado' : '')
    : 'vazio');
  div.dataset.id = s.id;
  div.style.cssText =
    `top:${s.top};left:${s.left};width:${s.w};height:${s.h};` +
    `transform:rotate(${s.rot || '0deg'});`;

  if (jaColado && fig?.url) {
    const img = document.createElement('img');
    img.src = fig.url;
    img.alt = `Figurinha ${s.id}`;
    div.appendChild(img);
  } else if (jaColado) {
    div.textContent = s.id;
  } else {
    div.textContent = s.id;
    div.addEventListener('dragover',  e => { e.preventDefault(); div.classList.add('drop-over') });
    div.addEventListener('dragleave', ()  => div.classList.remove('drop-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drop-over');
      if (parseInt(e.dataTransfer.getData('fig-id')) === s.id) colar(s.id);
    });
    div.addEventListener('click', () => { if (inv.includes(s.id)) colar(s.id) });
  }
  container.appendChild(div);
}

// ─── INVENTÁRIO ──────────────────────────────────────
function renderInv() {
  const scroll = document.getElementById('inv-scroll');
  const vazio  = document.getElementById('inv-vazio');
  scroll.querySelectorAll('.inv-card').forEach(el => el.remove());

  if (inv.length === 0) { vazio.style.display = 'block'; return }
  vazio.style.display = 'none';

  const cnt = {};
  inv.forEach(id => cnt[id] = (cnt[id] || 0) + 1);
  [...new Set(inv)].forEach(id => {
    const fig     = figuras.find(f => f.id === id);
    if (!fig) return;
    const especial = fig.tema === 'Especiais';
    const qtd      = cnt[id];
    const temaNome = TEMAS.find(t => t.ids.includes(id))?.nome || '';

    const card = document.createElement('div');
    card.className = 'inv-card';
    card.draggable  = true;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('fig-id', id);
      card.classList.add('arrastando');
    });
    card.addEventListener('dragend', () => card.classList.remove('arrastando'));

    const thumb = document.createElement('img');
    thumb.className = 'inv-thumb' + (especial ? ' especial' : '');
    thumb.src = fig.url; thumb.alt = `#${id}`;

    const info = document.createElement('div');
    info.className = 'inv-info';
    info.innerHTML =
      `<div class="inv-num">#${id}</div>` +
      `<div class="inv-tema">${temaNome}</div>` +
      (qtd > 1 ? `<span class="badge badge-dup">×${qtd}</span>` : '') +
      (especial ? `<span class="badge badge-esp">✨ Especial</span>` : '');

    card.append(thumb, info);
    scroll.appendChild(card);
  });
}

// ─── COLAR ───────────────────────────────────────────
function colar(id) {
  if (colado.includes(id)) return;
  const idx = inv.indexOf(id);
  if (idx === -1) return;
  inv.splice(idx, 1);
  colado.push(id);
  salvar();
  renderPagina();
  const t = TEMAS[pagAtual];
  if (t.ids.every(i => colado.includes(i))) setTimeout(mostrarTrofeu, 700);
}

// ─── PACOTE ──────────────────────────────────────────
function abrirPacote() {
  const env = document.getElementById('envelope');
  env.classList.remove('rasgando');
  env.style.display = 'flex';
  document.getElementById('env-dica').style.display = 'block';
  document.getElementById('reveal-row').classList.remove('show');
  document.getElementById('reveal-row').innerHTML = '';
  document.getElementById('btn-guardar').classList.remove('show');
  document.getElementById('pack-overlay').classList.add('show');
}

function rasgar() {
  const env = document.getElementById('envelope');
  if (env.classList.contains('rasgando')) return;
  const faltando = figuras.filter(f => !colado.includes(f.id) && !inv.includes(f.id)).map(f => f.id);
  const pool  = faltando.length > 0 ? faltando : figuras.map(f => f.id);
  const copia = [...pool];
  pendentes   = [];
  for (let i = 0; i < 3; i++) {
    if (!copia.length) break;
    const r = Math.floor(Math.random() * copia.length);
    pendentes.push(copia.splice(r, 1)[0]);
  }
  env.classList.add('rasgando');
  document.getElementById('env-dica').style.display = 'none';
  setTimeout(() => { env.style.display = 'none'; mostrarReveal() }, 520);
}

function mostrarReveal() {
  const row = document.getElementById('reveal-row');
  row.innerHTML = '';
  pendentes.forEach(id => {
    const fig  = figuras.find(f => f.id === id);
    if (!fig) return;
    const esp  = fig.tema === 'Especiais';
    const card = document.createElement('div');
    card.className = 'reveal-card' + (esp ? ' especial' : '');
    const img  = document.createElement('img');
    img.className = 'reveal-img'; img.src = fig.url; img.alt = `#${id}`;
    const num  = document.createElement('div');
    num.className = 'reveal-num'; num.textContent = '#' + id;
    card.append(img, num);
    row.appendChild(card);
  });
  row.classList.add('show');
  document.getElementById('btn-guardar').classList.add('show');
}

function guardar() {
  pendentes.forEach(id => inv.push(id));
  salvar(); renderInv();
  document.getElementById('pack-overlay').classList.remove('show');
  pendentes = [];
}

// ─── TROFÉU ──────────────────────────────────────────
function mostrarTrofeu() {
  const t   = TEMAS[pagAtual];
  const fig = figuras.find(f => f.id === t.ids[0]);
  document.getElementById('trofeu-voucher').textContent = fig?.texto || '🎉 Página completa!';
  document.getElementById('trofeu-modal').classList.add('show');
}
function fecharTrofeu() { document.getElementById('trofeu-modal').classList.remove('show') }

// ─── NAV ─────────────────────────────────────────────
function virar(dir) {
  const n = pagAtual + dir;
  if (n >= 0 && n < TEMAS.length) { pagAtual = n; renderPagina() }
}

// ─── SAVE ────────────────────────────────────────────
function salvar() {
  localStorage.setItem('alb4_inv',    JSON.stringify(inv));
  localStorage.setItem('alb4_colado', JSON.stringify(colado));
}

window.addEventListener('load',   carregarDados);
window.addEventListener('resize', () => { if (TEMAS[pagAtual]) desenharCanvas(TEMAS[pagAtual]) });
</script>
