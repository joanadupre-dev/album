<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Vezes Em Que Eu Te Vi</title>
<style>
@font-face {
  font-family: 'LazyDog';
  src: url('lazydog.ttf') format('truetype');
  font-weight: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'LazyDog', cursive;
  background: #f0e6d6;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  transition: background 0.5s ease;
}

/* Fundo Especial */
body.special-theme { background: #1a1a2e; }

#app { display: flex; gap: 30px; max-width: 1400px; width: 100%; height: 80vh; }

/* ESTRUTURA DO LIVRO */
#book {
  flex: 2;
  background: #fdfbf7;
  display: flex;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

/* Divisória central (Lombada) */
#book::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(0,0,0,0.05);
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  z-index: 100;
}

.page {
  width: 50%;
  height: 100%;
  padding: 40px;
  position: relative;
  background: #fdfbf7;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.page.changing { opacity: 0; transform: translateY(10px); }

/* CAPA */
.cover {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.cover-title { font-size: 4rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

/* SLOTS VERTICAIS */
.slot {
  position: absolute;
  aspect-ratio: 2 / 3;
  background: #f5ebe0;
  border: 2px dashed #d6c5b0;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; color: #d6c5b0;
  cursor: pointer;
}

.slot.filled { border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

/* IMAGEM 50% DENTRO DO SLOT */
.slot img {
  width: 60%; height: 60%;
  object-fit: contain;
}

/* ESPECIAIS DOURADOS */
.slot.special.filled {
  background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c);
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.page-title { font-size: 3rem; margin-bottom: 20px; color: #4a4a4a; }

/* DECORAÇÕES */
.deco { position: absolute; z-index: 5; pointer-events: none; }
.deco img { width: 100%; opacity: 0.8; }

/* SIDEBAR E INVENTÁRIO */
#sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }

#btn-pack {
  background: #a855f7; color: white; border: none; padding: 15px;
  border-radius: 10px; font-family: 'LazyDog'; font-size: 1.5rem;
  cursor: pointer; box-shadow: 0 5px 0 #7c3aed;
}
#btn-pack:active { transform: translateY(3px); box-shadow: 0 2px 0 #7c3aed; }

#inventory {
  background: white; border-radius: 10px; padding: 15px;
  flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  border: 2px solid #e8dcc8;
}

.inv-item {
  display: flex; align-items: center; gap: 10px; padding: 8px;
  border: 1px solid #eee; border-radius: 8px; cursor: grab;
}
.inv-item img { width: 40px; height: 50px; object-fit: contain; }

.nav-btns { display: flex; gap: 10px; }
.nav-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-family: 'LazyDog'; font-size: 1.2rem; color: white; }
.prev { background: #94a3b8; }
.next { background: #2dd4bf; }

/* ENVELOPE CUTE (Puro CSS) */
#pack-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
}
#pack-overlay.active { display: flex; }

.envelope {
  width: 200px; height: 260px; background: #ffcfdf;
  border-radius: 10px; position: relative; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid white;
}
.envelope::after { content: '❤'; font-size: 3rem; color: white; }

.reveal-zone { display: flex; gap: 15px; margin-top: 20px; }
.revealed-card { background: white; padding: 10px; border-radius: 8px; text-align: center; animation: pop 0.3s ease forwards; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

</style>
</head>
<body>

<div id="app">
  <div id="book">
    <div class="page" id="page-l"></div>
    <div class="page" id="page-r"></div>
  </div>

  <div id="sidebar">
    <button id="btn-pack" onclick="openPack()">🎁 NOVO PACOTE</button>
    <div id="inventory" id="inv-list"></div>
    <div class="nav-btns">
      <button class="nav-btn prev" onclick="changePage(-1)">← ANTERIOR</button>
      <button class="nav-btn next" onclick="changePage(1)">PRÓXIMA →</button>
    </div>
  </div>
</div>

<div id="pack-overlay" id="overlay">
  <div class="envelope" onclick="revealStickers()"></div>
  <div class="reveal-zone" id="reveal-zone"></div>
  <button id="btn-collect" style="display:none; margin-top:20px;" class="nav-btn next" onclick="collectStickers()">GUARDAR TUDO</button>
</div>

<script>
const SHEET_ID = '1KOgDq-gMhwOH_H9dPVrzTjGB86Is78hZ-0zNn4D6s7E';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let allStickers = [];
let inventory = JSON.parse(localStorage.getItem('inv_v2') || '[]');
let glued = JSON.parse(localStorage.getItem('glued_v2') || '[]');
let currentPage = 0;
let packPending = [];

// MAPA DE PÁGINAS (CORRIGIDO PARA SER VERTICAL E ORGANIZADO)
const PAGES = [
  { name: 'CAPA', isCover: true },
  { name: 'COMENDO', ids: [1,2,3,4], 
    l: [{id:1, t:'20%', l:'15%', w:'30%'}, {id:2, t:'55%', l:'15%', w:'30%'}],
    r: [{id:3, t:'20%', l:'15%', w:'30%'}, {id:4, t:'55%', l:'15%', w:'30%'}],
    decos: [{img:'18.png', t:'10%', l:'60%', w:'100px'}]
  },
  { name: 'BRINCANDO', ids: [5,6,7,8,9], 
    l: [{id:5, t:'20%', l:'15%', w:'30%'}, {id:6, t:'55%', l:'15%', w:'30%'}],
    r: [{id:7, t:'15%', l:'10%', w:'25%'}, {id:8, t:'15%', l:'45%', w:'25%'}, {id:9, t:'55%', l:'15%', w:'30%'}],
    decos: [{img:'9.png', t:'70%', l:'60%', w:'80px'}]
  },
  { name: 'CUIDANDO', ids: [10,11,12,13,14],
    l: [{id:10, t:'20%', l:'15%', w:'30%'}, {id:11, t:'55%', l:'15%', w:'30%'}],
    r: [{id:12, t:'15%', l:'10%', w:'25%'}, {id:14, t:'15%', l:'45%', w:'25%'}, {id:13, t:'55%', l:'15%', w:'30%'}],
    decos: [{img:'24.png', t:'40%', l:'60%', w:'90px'}]
  },
  { name: 'EXPLORANDO', ids: [15,16,17,18,19],
    l: [{id:15, t:'20%', l:'10%', w:'25%'}, {id:16, t:'20%', l:'45%', w:'25%'}, {id:17, t:'60%', l:'25%', w:'25%'}],
    r: [{id:18, t:'20%', l:'15%', w:'30%'}, {id:19, t:'55%', l:'15%', w:'30%'}],
    decos: [{img:'2.png', t:'10%', l:'70%', w:'80px'}]
  },
  { name: 'ESPECIAIS', ids: [26,27,28,29], isSpecial: true,
    l: [{id:26, t:'20%', l:'15%', w:'30%'}, {id:27, t:'55%', l:'15%', w:'30%'}],
    r: [{id:28, t:'20%', l:'15%', w:'30%'}, {id:29, t:'55%', l:'15%', w:'30%'}],
    decos: [{img:'31.png', t:'5%', l:'5%', w:'120px'}]
  }
];

async function init() {
  const res = await fetch(SHEET_URL);
  const txt = await res.text();
  const json = JSON.parse(txt.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
  allStickers = json.table.rows.map(r => ({
    id: Number(r.c[0].v),
    url: String(r.c[2].v).trim(),
    theme: String(r.c[1].v)
  }));
  render();
}

function render() {
  const p = PAGES[currentPage];
  const l = document.getElementById('page-l');
  const r = document.getElementById('page-r');
  
  l.classList.add('changing'); r.classList.add('changing');
  
  setTimeout(() => {
    l.innerHTML = ''; r.innerHTML = '';
    document.body.className = p.isSpecial ? 'special-theme' : '';

    if (p.isCover) {
      l.innerHTML = `<div class="cover"><h1 class="cover-title">29 vezes em que eu te vi</h1></div>`;
      r.style.background = '#f5f5f5';
    } else {
      l.innerHTML = `<h2 class="page-title">${p.name}</h2>`;
      p.l.forEach(s => createSlot(l, s, p.isSpecial));
      p.r.forEach(s => createSlot(r, s, p.isSpecial));
      p.decos?.forEach(d => {
        l.innerHTML += `<div class="deco" style="top:${d.t};left:${d.l};width:${d.w}"><img src="${d.img}"></div>`;
      });
    }
    
    l.classList.remove('changing'); r.classList.remove('changing');
    renderInv();
  }, 400);
}

function createSlot(container, conf, spec) {
  const isGlued = glued.includes(conf.id);
  const sticker = allStickers.find(s => s.id === conf.id);
  const div = document.createElement('div');
  div.className = `slot ${isGlued ? 'filled' : ''} ${spec ? 'special' : ''}`;
  div.style.cssText = `top:${conf.t}; left:${conf.l}; width:${conf.w};`;
  
  if (isGlued && sticker) {
    div.innerHTML = `<img src="${sticker.url}">`;
  } else {
    div.innerText = conf.id;
    div.onclick = () => { if(inventory.includes(conf.id)) glue(conf.id); };
  }
  container.appendChild(div);
}

function renderInv() {
  const list = document.getElementById('inventory');
  list.innerHTML = inventory.length ? '' : '<p style="color:#999;text-align:center;margin-top:20px;">Abra pacotes!</p>';
  
  // Ordena o inventário numericamente antes de mostrar
  const sortedInv = [...new Set(inventory)].sort((a,b) => a - b);
  
  sortedInv.forEach(id => {
    const s = allStickers.find(x => x.id === id);
    const count = inventory.filter(x => x === id).length;
    const item = document.createElement('div');
    item.className = 'inv-item';
    item.innerHTML = `<img src="${s.url}"> <div><b>#${id}</b> (${count}x)</div>`;
    item.onclick = () => glue(id);
    list.appendChild(item);
  });
}

function glue(id) {
  const p = PAGES[currentPage];
  if (!p.ids?.includes(id)) return alert("Essa figurinha não é desta página!");
  glued.push(id);
  inventory.splice(inventory.indexOf(id), 1);
  save(); render();
}

function openPack() { document.getElementById('pack-overlay').classList.add('active'); }

function revealStickers() {
  if (packPending.length) return;
  for(let i=0; i<3; i++) packPending.push(allStickers[Math.floor(Math.random()*allStickers.length)].id);
  const zone = document.getElementById('reveal-zone');
  zone.innerHTML = packPending.map(id => `<div class="revealed-card"><img src="${allStickers.find(s=>s.id===id).url}" width="60"><br>#${id}</div>`).join('');
  document.getElementById('btn-collect').style.display = 'block';
}

function collectStickers() {
  inventory.push(...packPending); packPending = [];
  document.getElementById('pack-overlay').classList.remove('active');
  document.getElementById('reveal-zone').innerHTML = '';
  document.getElementById('btn-collect').style.display = 'none';
  save(); renderInv();
}

function changePage(dir) {
  if (currentPage + dir >= 0 && currentPage + dir < PAGES.length) {
    currentPage += dir; render();
  }
}

function save() {
  localStorage.setItem('inv_v2', JSON.stringify(inventory));
  localStorage.setItem('glued_v2', JSON.stringify(glued));
}

init();
</script>
</body>
</html>
