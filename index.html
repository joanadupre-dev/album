#app {

/* BOOK */
#book {

  width: 1000px;
  height: 650px;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  display: flex;
  position: relative;
  overflow: hidden;
}

#book::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 8px;

  z-index: 100;
}

.page {

  height: 100%;
  position: relative;
  padding: 40px;
  background: #fafafa;
}

.page-title {
  font-size: 3.5rem;
  line-height: 1;
  margin-bottom: 30px;
  color: #222;
}

.sticker-deco {
  position: absolute;
  z-index: 5;
  pointer-events: none;
}

.sticker-deco img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,.2));
}

.slots-container {
  position: absolute;
  inset: 0;
  z-index: 10;
}

.slot {
  position: absolute;
  background: #f5eee0;
  border: 2px solid #e8e0cc;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  color: rgba(0,0,0,.15);
  cursor: pointer;
  transition: all .2s;
  overflow: hidden;
}

.slot:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 20px rgba(0,0,0,.15);
}

.slot.drag-over {
  background: #fff3cd;
  border-color: #ffc107;
  box-shadow: 0 0 0 3px rgba(255,193,7,.3);
}

.slot.filled {
  background: #fff;
  border-color: #ddd;
}

.slot.filled img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 8px;
}

.slot.special.filled::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, 
    rgba(255,215,0,.3) 0%, 
    rgba(255,80,200,.2) 35%, 
    rgba(80,220,255,.2) 65%, 
    rgba(255,215,0,.3) 100%);
  background-size: 300% auto;
  animation: hologram 3s linear infinite;
  pointer-events: none;
  mix-blend-mode: overlay;
}

@keyframes hologram {
  0% { background-position: 0% center; }
  100% { background-position: 300% center; }
}

  gap: 16px;

#sidebar h2 {

  color: #222;

}

#inventory {

  gap: 10px;
  padding: 10px;
  background: #fafafa;
  border-radius: 8px;

.inventory-card {

  border-radius: 8px;
  padding: 8px;

}

.inventory-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}

.inventory-card.dragging {
  opacity: .4;

}

.inventory-thumb {
  width: 50px;
  height: 50px;
  background: #f5f5f5;
  border-radius: 4px;

  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;

.inventory-thumb img {

  max-height: 100%;

}

.inventory-info {

}

.inventory-number {

.inventory-theme {
  font-size: .85rem;

.inventory-empty {

.nav-buttons {

.nav-btn {

.nav-btn:hover {

.nav-btn:active {
  transform: translateY(0);

.nav-prev {

.nav-next {
  background: #28a745;

#btn-pack {

/* PACK OVERLAY */

  align-items: center;
  justify-content: center;
  flex-direction: column;

}

#pack-overlay.active {
  display: flex;
}

.envelope {
  width: 200px;
  height: 280px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  cursor: pointer;
  box-shadow: 0 20px 50px rgba(0,0,0,.5);
  animation: float 2.5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

.envelope::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 35%;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  border-bottom: 2px dashed rgba(255,255,255,.2);
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }

}

.envelope-icon {
  font-size: 3rem;
  position: relative;
  z-index: 1;

.envelope-text {

  font-size: 1.8rem;
  color: #fff;
  text-align: center;
  line-height: 1.2;
  position: relative;
  z-index: 1;
}

.envelope-hint {

  color: rgba(255,255,255,.5);
  font-size: 1rem;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: .3; }
  50% { opacity: 1; }

.envelope.tearing {
  animation: tear .5s forwards;
}

@keyframes tear {
  0% { transform: rotate(-2deg) scale(1); }
  30% { transform: rotate(6deg) scale(1.08); }
  60% { transform: rotate(-8deg) scale(.92); }

@keyframes pop {

.trophy-icon {

@keyframes trophy-pop {
  from { transform: scale(0) translateY(60px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.trophy-title {
  font-family: 'Caveat Brush', cursive;
  font-size: 3rem;
  color: #ffd700;
}

.trophy-message {

  padding: 25px 40px;
  border-radius: 8px;
  border: 4px solid #ffd700;
  font-family: 'Caveat Brush', cursive;
  font-size: 1.3rem;
  text-align: center;
  max-width: 500px;
  color: #222;
  line-height: 1.6;

/* LOADING */
#loading {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

#loading.hide {

}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid #f3f3f3;
  border-top: 4px solid #667eea;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.load-text {
  font-family: 'Caveat Brush', cursive;
  font-size: 1.5rem;
  color: #666;
}

  }
}

function renderPage() {
  const page = PAGES[currentPage];
  const leftPage = document.getElementById('page-left');
  const rightPage = document.getElementById('page-right');
  
  // Clear
  leftPage.innerHTML = '';
  rightPage.innerHTML = '';
  
  // Left page
  const leftTitle = document.createElement('div');
  leftTitle.className = 'page-title';
  leftTitle.textContent = page.name;
  leftPage.appendChild(leftTitle);
  
  // Left decorations
  page.leftDecos.forEach(deco => {
    const div = document.createElement('div');
    div.className = 'sticker-deco';
    div.style.cssText = `top:${deco.top};left:${deco.left};width:${deco.width}`;
    div.textContent = STICKER_EMOJIS[deco.img] || '🎨';
    leftPage.appendChild(div);
  });
  
  // Left slots
  const leftSlots = document.createElement('div');
  leftSlots.className = 'slots-container';
  page.leftSlots.forEach(s => createSlot(leftSlots, s, page));
  leftPage.appendChild(leftSlots);
  
  // Right decorations
  page.rightDecos.forEach(deco => {
    const div = document.createElement('div');
    div.className = 'sticker-deco';
    div.style.cssText = `top:${deco.top};left:${deco.left};width:${deco.width}`;
    div.textContent = STICKER_EMOJIS[deco.img] || '🎨';
    rightPage.appendChild(div);
  });
  
  // Right slots
  const rightSlots = document.createElement('div');
  rightSlots.className = 'slots-container';
  page.rightSlots.forEach(s => createSlot(rightSlots, s, page));
  rightPage.appendChild(rightSlots);
  
  renderInventory();
}

function createSlot(container, config, page) {
  const sticker = allStickers.find(s => s.id === config.id);
  const filled = glued.includes(config.id);
  const isSpecial = page.name === 'ESPECIAIS';
  
  const slot = document.createElement('div');
  slot.className = 'slot' + (filled ? ' filled' : '') + (filled && isSpecial ? ' special' : '');
  slot.dataset.slotId = config.id;
  slot.style.cssText = `top:${config.top};left:${config.left};width:${config.width};height:${config.height}`;
  
  if (filled && sticker?.url) {
    const img = document.createElement('img');
    img.src = sticker.url;
    slot.appendChild(img);
  } else if (!filled) {
    slot.textContent = config.id;
    
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const draggedId = parseInt(e.dataTransfer.getData('stickerId'));
      if (draggedId === config.id) glueSticker(config.id);
    });
    slot.addEventListener('click', () => {
      if (inventory.includes(config.id)) glueSticker(config.id);
    });
  }
  
  container.appendChild(slot);
}

function renderInventory() {
  const inv = document.getElementById('inventory');
  inv.querySelectorAll('.inventory-card').forEach(c => c.remove());
  
  const empty = inv.querySelector('.inventory-empty');
  if (inventory.length === 0) {
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';
  
  const counts = {};
  inventory.forEach(id => counts[id] = (counts[id] || 0) + 1);
  
  [...new Set(inventory)].forEach(id => {
    const sticker = allStickers.find(s => s.id === id);
    if (!sticker) return;
    
    const card = document.createElement('div');
    card.className = 'inventory-card';
    card.draggable = true;
    
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('stickerId', id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    
    const thumb = document.createElement('div');
    thumb.className = 'inventory-thumb';
    const img = document.createElement('img');
    img.src = sticker.url;
    thumb.appendChild(img);
    
    const info = document.createElement('div');
    info.className = 'inventory-info';
    info.innerHTML = 
      `<div class="inventory-number">#${id}${counts[id] > 1 ? ' ×'+counts[id] : ''}</div>
       <div class="inventory-theme">${sticker.theme}</div>`;
    
    card.appendChild(thumb);
    card.appendChild(info);
    inv.appendChild(card);
  });
}

function glueSticker(id) {
  if (glued.includes(id)) return;
  const idx = inventory.indexOf(id);
  if (idx === -1) return;
  
  inventory.splice(idx, 1);
  glued.push(id);
  save();
  renderPage();
  
  const page = PAGES[currentPage];
  const allIds = [...page.leftSlots, ...page.rightSlots].map(s => s.id);
  if (allIds.every(i => glued.includes(i))) {
    setTimeout(showTrophy, 700);
  }
}

function openPack() {
  const env = document.getElementById('envelope');
  env.classList.remove('tearing');
  env.style.display = 'flex';
  document.querySelector('.envelope-hint').style.display = 'block';
  document.getElementById('reveal-cards').classList.remove('active');
  document.getElementById('reveal-cards').innerHTML = '';
  document.getElementById('btn-collect').classList.remove('active');
  document.getElementById('pack-overlay').classList.add('active');
}

function tearPack() {
  const env = document.getElementById('envelope');
  if (env.classList.contains('tearing')) return;
  
  const missing = allStickers.filter(s => !glued.includes(s.id) && !inventory.includes(s.id)).map(s => s.id);
  const pool = missing.length ? missing : allStickers.map(s => s.id);
  const copy = [...pool];
  pending = [];
  
  for (let i = 0; i < 3; i++) {
    if (copy.length === 0) break;
    const r = Math.floor(Math.random() * copy.length);
    pending.push(copy.splice(r, 1)[0]);
  }
  
  env.classList.add('tearing');
  document.querySelector('.envelope-hint').style.display = 'none';
  
  setTimeout(() => {
    env.style.display = 'none';
    showReveal();
  }, 500);
}

function showReveal() {
  const cards = document.getElementById('reveal-cards');
  cards.innerHTML = '';
  
  pending.forEach(id => {
    const sticker = allStickers.find(s => s.id === id);
    if (!sticker) return;
    
    const card = document.createElement('div');
    card.className = 'reveal-card';
    
    const photo = document.createElement('div');
    photo.className = 'reveal-photo';
    const img = document.createElement('img');
    img.src = sticker.url;
    photo.appendChild(img);
    
    const num = document.createElement('div');
    num.className = 'reveal-number';
    num.textContent = `#${id}`;
    
    card.appendChild(photo);
    card.appendChild(num);
    cards.appendChild(card);
  });
  
  cards.classList.add('active');
  document.getElementById('btn-collect').classList.add('active');
}

function collect() {
  pending.forEach(id => inventory.push(id));
  save();
  renderInventory();
  document.getElementById('pack-overlay').classList.remove('active');
  pending = [];
}

function showTrophy() {
  const page = PAGES[currentPage];
  const firstId = [...page.leftSlots, ...page.rightSlots][0].id;
  const sticker = allStickers.find(s => s.id === firstId);
  document.getElementById('trophy-msg').textContent = sticker?.voucher || '🎉 Parabéns!';
  document.getElementById('trophy-modal').classList.add('active');
}

function closeTrophy() {
  document.getElementById('trophy-modal').classList.remove('active');
}

function navigate(dir) {
  const newPage = currentPage + dir;
  if (newPage >= 0 && newPage < PAGES.length) {
    currentPage = newPage;
    renderPage();
  }
}

function save() {
  localStorage.setItem('album_v9_inv', JSON.stringify(inventory));
  localStorage.setItem('album_v9_glued', JSON.stringify(glued));
}

window.addEventListener('load', init);
</script>
</body>
</html>
