let allStickers = [];
let inventory = JSON.parse(localStorage.getItem('album_v10_inv') || '[]');
let glued = JSON.parse(localStorage.getItem('album_v10_glued') || '[]');
let currentPage = 0;
let pending = [];

async function init() {
  try {
    const res = await fetch(SHEET_URL);
    const txt = await res.text();
    const json = JSON.parse(txt.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    allStickers = json.table.rows
      .filter(r => r.c[0]?.v != null)
      .map(r => ({
        id: Number(r.c[0].v),
        theme: String(r.c[1]?.v || '').trim(),
        url: String(r.c[2]?.v || '').trim(),
        voucher: String(r.c[3]?.v || '').trim()
      }));
    
    document.getElementById('loading').classList.add('hide');
    document.getElementById('app').style.display = 'flex';
    renderPage();
  } catch (e) {
    console.error(e);
    document.getElementById('loading').innerHTML = 
      `<div style="color:#dc3545;text-align:center;padding:40px;font-family:Arial,sans-serif">
        <div style="font-size:3rem;margin-bottom:15px">⚠️</div>
        <strong style="font-size:1.2rem">Erro ao carregar dados</strong><br><br>
        <small style="color:#888">${e.message}</small>
      </div>`;
  }
}

function renderPage() {
  const page = PAGES[currentPage];
  const leftPage = document.getElementById('page-left');
  const rightPage = document.getElementById('page-right');
  
  leftPage.innerHTML = '';
  rightPage.innerHTML = '';
  
  const leftTitle = document.createElement('div');
  leftTitle.className = 'page-title';
  leftTitle.textContent = page.name;
  leftPage.appendChild(leftTitle);
  
  page.leftDecos.forEach(deco => {
    const div = document.createElement('div');
    div.className = 'sticker-deco';
    div.style.cssText = `top:${deco.top};left:${deco.left};width:${deco.width}`;
    const img = document.createElement('img');
    img.src = deco.img;
    img.alt = '';
    div.appendChild(img);
    leftPage.appendChild(div);
  });
  
  const leftSlots = document.createElement('div');
  leftSlots.className = 'slots-container';
  page.leftSlots.forEach(s => createSlot(leftSlots, s, page));
  leftPage.appendChild(leftSlots);
  
  page.rightDecos.forEach(deco => {
    const div = document.createElement('div');
    div.className = 'sticker-deco';
    div.style.cssText = `top:${deco.top};left:${deco.left};width:${deco.width}`;
    const img = document.createElement('img');
    img.src = deco.img;
    img.alt = '';
    div.appendChild(img);
    rightPage.appendChild(div);
  });
  
  const rightSlots = document.createElement('div');
  rightSlots.className = 'slots-container';
  page.rightSlots.forEach(s => createSlot(rightSlots, s, page));
  rightPage.appendChild(rightSlots);
  
  renderInventory();
}

function createSlot(container, config, page) {
  const sticker = allStickers.find(s => s.id === config.id);
  const filled = glued.includes(config.id);
  const isSpecial = page.name === 'ESPECIAIS';
  
  const slot = document.createElement('div');
  slot.className = 'slot' + (filled ? ' filled' : '') + (filled && isSpecial ? ' special' : '');
  slot.dataset.slotId = config.id;
  slot.style.cssText = `top:${config.top};left:${config.left};width:${config.width};height:${config.height}`;
  
  if (filled && sticker?.url) {
    const img = document.createElement('img');
    img.src = sticker.url;
    img.alt = `Figurinha ${config.id}`;
    slot.appendChild(img);
  } else if (!filled) {
    slot.textContent = config.id;
    
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const draggedId = parseInt(e.dataTransfer.getData('stickerId'));
      if (draggedId === config.id) glueSticker(config.id);
    });
    slot.addEventListener('click', () => {
      if (inventory.includes(config.id)) glueSticker(config.id);
    });
  }
  
  container.appendChild(slot);
}

function renderInventory() {
  const inv = document.getElementById('inventory');
  inv.querySelectorAll('.inventory-card').forEach(c => c.remove());
  
  const empty = inv.querySelector('.inventory-empty');
  if (inventory.length === 0) {
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';
  
  const counts = {};
  inventory.forEach(id => counts[id] = (counts[id] || 0) + 1);
  
  [...new Set(inventory)].forEach(id => {
    const sticker = allStickers.find(s => s.id === id);
    if (!sticker) return;
    
    const card = document.createElement('div');
    card.className = 'inventory-card';
    card.draggable = true;
    
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('stickerId', id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    
    const thumb = document.createElement('div');
    thumb.className = 'inventory-thumb';
    const img = document.createElement('img');
    img.src = sticker.url;
    img.alt = `#${id}`;
    thumb.appendChild(img);
    
    const info = document.createElement('div');
    info.className = 'inventory-info';
    info.innerHTML = 
      `<div class="inventory-number">#${id}${counts[id] > 1 ? ' ×'+counts[id] : ''}</div>
       <div class="inventory-theme">${sticker.theme}</div>`;
    
    card.appendChild(thumb);
    card.appendChild(info);
    inv.appendChild(card);
  });
}

function glueSticker(id) {
  if (glued.includes(id)) return;
  const idx = inventory.indexOf(id);
  if (idx === -1) return;
  
  inventory.splice(idx, 1);
  glued.push(id);
  save();
  renderPage();
  
  const page = PAGES[currentPage];
  const allIds = [...page.leftSlots, ...page.rightSlots].map(s => s.id);
  if (allIds.every(i => glued.includes(i))) {
    setTimeout(showTrophy, 750);
  }
}

function openPack() {
  const env = document.getElementById('envelope');
  env.classList.remove('tearing');
  env.style.display = 'flex';
  document.querySelector('.envelope-hint').style.display = 'block';
  document.getElementById('reveal-cards').classList.remove('active');
  document.getElementById('reveal-cards').innerHTML = '';
  document.getElementById('btn-collect').classList.remove('active');
  document.getElementById('pack-overlay').classList.add('active');
}

function tearPack() {
  const env = document.getElementById('envelope');
  if (env.classList.contains('tearing')) return;
  
  const missing = allStickers.filter(s => !glued.includes(s.id) && !inventory.includes(s.id)).map(s => s.id);
  const pool = missing.length ? missing : allStickers.map(s => s.id);
  const copy = [...pool];
  pending = [];
  
  for (let i = 0; i < 3; i++) {
    if (copy.length === 0) break;
    const r = Math.floor(Math.random() * copy.length);
    pending.push(copy.splice(r, 1)[0]);
  }
  
  env.classList.add('tearing');
  document.querySelector('.envelope-hint').style.display = 'none';
  
  setTimeout(() => {
    env.style.display = 'none';
    showReveal();
  }, 550);
}

function showReveal() {
  const cards = document.getElementById('reveal-cards');
  cards.innerHTML = '';
  
  pending.forEach(id => {
    const sticker = allStickers.find(s => s.id === id);
    if (!sticker) return;
    
    const card = document.createElement('div');
    card.className = 'reveal-card';
    
    const photo = document.createElement('div');
    photo.className = 'reveal-photo';
    const img = document.createElement('img');
    img.src = sticker.url;
    img.alt = `#${id}`;
    photo.appendChild(img);
    
    const num = document.createElement('div');
    num.className = 'reveal-number';
    num.textContent = `#${id}`;
    
    card.appendChild(photo);
    card.appendChild(num);
    cards.appendChild(card);
  });
  
  cards.classList.add('active');
  document.getElementById('btn-collect').classList.add('active');
}

function collect() {
  pending.forEach(id => inventory.push(id));
  save();
  renderInventory();
  document.getElementById('pack-overlay').classList.remove('active');
  pending = [];
}

function showTrophy() {
  const page = PAGES[currentPage];
  const firstId = [...page.leftSlots, ...page.rightSlots][0].id;
  const sticker = allStickers.find(s => s.id === firstId);
  document.getElementById('trophy-msg').textContent = sticker?.voucher || '🎉 Parabéns! Página completa!';
  document.getElementById('trophy-modal').classList.add('active');
}

function closeTrophy() {
  document.getElementById('trophy-modal').classList.remove('active');
}

function navigate(dir) {
  const newPage = currentPage + dir;
  if (newPage >= 0 && newPage < PAGES.length) {
    currentPage = newPage;
    renderPage();
  }
}

function save() {
  localStorage.setItem('album_v10_inv', JSON.stringify(inventory));
  localStorage.setItem('album_v10_glued', JSON.stringify(glued));
}

window.addEventListener('load', init);
</script>
</body>
</html>
