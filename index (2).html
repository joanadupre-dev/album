<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Vezes Em Que Eu Te Vi 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #1c0d14;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: #1c0d14;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  transition: opacity .5s;
}
#loading.gone { opacity: 0; pointer-events: none; }
.spin {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,.08); border-top-color: #da291c;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-family: 'Bebas Neue'; color: rgba(255,255,255,.25); letter-spacing: 6px; font-size: .85rem; }

/* ── CAPA ── */
#capa {
  position: fixed; inset: 0; z-index: 8000;
  background: radial-gradient(ellipse at 30% 20%, #8b2035 0%, #3a0b14 55%, #1c0508 100%);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .9s, transform .9s;
}
#capa.gone { opacity: 0; pointer-events: none; transform: scale(1.05); }
.capa-book {
  background: #fdf6ec;
  padding: 52px 68px;
  border: 11px solid #a3cc3a;
  box-shadow: 0 0 0 3px #6c1d33, 26px 26px 0 rgba(0,0,0,.55);
  text-align: center;
  transform: rotate(-1.6deg);
  position: relative;
  max-width: 430px;
}
.capa-book::before {
  content: ''; position: absolute; inset: 8px;
  border: 1.5px solid rgba(108,29,51,.18); pointer-events: none;
}
.capa-tag {
  display: inline-block; background: #da291c; color: #fff;
  font-size: .55rem; font-weight: 900; letter-spacing: 8px;
  text-transform: uppercase; padding: 4px 14px; margin-bottom: 18px;
}
.capa-title {
  font-family: 'Bebas Neue';
  font-size: clamp(3.2rem, 8vw, 5.6rem);
  color: #6c1d33; line-height: .86;
}
.capa-rule { width: 52px; height: 4px; background: #a3cc3a; margin: 18px auto; }
.capa-sub { font-size: .62rem; font-weight: 900; letter-spacing: 5px; color: #bbb; text-transform: uppercase; }
.btn-open {
  display: block; margin: 26px auto 0;
  background: #6c1d33; color: #fff; border: none;
  padding: 15px 50px;
  font-family: 'Bebas Neue'; font-size: 1.4rem; letter-spacing: 4px;
  cursor: pointer;
  border-bottom: 6px solid #3a0b14; border-right: 3px solid #3a0b14;
  border-radius: 2px; transition: .1s;
}
.btn-open:active { transform: translate(2px, 4px); border-bottom-width: 2px; }

/* ── STAGE ── */
#stage {
  display: flex; align-items: center; justify-content: center;
  gap: 14px;
  width: 100vw; height: 100vh;
  padding: 16px;
}

/* ── BOOK ── */
#book {
  /* Proporção livro aberto: 2:1.3 aprox */
  height: min(680px, 86vh);
  width: min(920px, 72vw);
  display: flex;
  border-radius: 3px;
  box-shadow:
    -8px 0 24px rgba(0,0,0,.5),
    8px 0 24px rgba(0,0,0,.5),
    0 40px 80px rgba(0,0,0,.9);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
/* Spine shadow */
#book::after {
  content: ''; position: absolute;
  left: 50%; top: 0; bottom: 0; width: 12px;
  transform: translateX(-50%);
  background: linear-gradient(to right, rgba(0,0,0,.02), rgba(0,0,0,.3) 50%, rgba(0,0,0,.02));
  z-index: 200; pointer-events: none;
}

/* ── LEFT PAGE ── */
#left {
  width: 50%; height: 100%;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 28px 24px 22px 28px;
}

.page-title {
  position: relative; z-index: 30;
  font-family: 'Bebas Neue';
  font-size: clamp(2.8rem, 5.5vw, 4rem);
  color: #fff;
  line-height: 1;
  letter-spacing: 1px;
  margin-bottom: 0;
  /* Small heart accent */
  display: flex; align-items: flex-start; gap: 8px;
}
.page-title::after {
  content: '♥';
  font-size: 1rem;
  margin-top: 6px;
  color: rgba(255,255,255,.4);
}

/* Decoration layer — behind slots */
#left-deco { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
/* Slots layer — in front of deco */
#left-slots { position: absolute; inset: 0; z-index: 10; }

/* ── RIGHT PAGE ── */
#right {
  width: 50%; height: 100%;
  position: relative; overflow: hidden;
}
#right-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
/* Counter top-right */
.page-counter {
  position: absolute; top: 18px; right: 18px; z-index: 20;
  font-family: 'Bebas Neue'; font-size: .72rem;
  letter-spacing: 4px; color: rgba(255,255,255,.8);
}
/* Slots on right */
#right-slots { position: absolute; inset: 0; z-index: 10; }
/* Nav bottom */
#nav {
  position: absolute; bottom: 18px; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-nav {
  font-family: 'Bebas Neue'; font-size: .85rem; letter-spacing: 2px;
  border: none; padding: 9px 20px; border-radius: 3px;
  border-bottom: 4px solid; cursor: pointer; transition: .1s;
}
.btn-nav:active { transform: translateY(3px); border-bottom-width: 1px; }
.bn-prev { background: #0056b8; color: #fff; border-bottom-color: #003580; }
.bn-cover { background: #6c1d33; color: #fff; border-bottom-color: #380e1a; }
.bn-next { background: #a3cc3a; color: #111; border-bottom-color: #6e9020; }

/* ── SLOT ── */
.slot {
  position: absolute;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  /* Strong shadow like reference */
  box-shadow: 5px 10px 28px rgba(0,0,0,.5);
  transition: box-shadow .2s, transform .15s;
  cursor: default;
}
.slot.empty-slot { border: none; }
.slot.drag-over {
  box-shadow: 0 0 0 4px #a3cc3a, 5px 10px 28px rgba(0,0,0,.5) !important;
  transform: scale(1.02) rotate(0deg) !important;
}
.slot-number {
  font-family: 'Bebas Neue';
  color: rgba(0,0,0,.18);
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  user-select: none;
}
/* Filled slot — contain preserves orientation */
.slot-photo {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  background: #fff;
  padding: 5px;
}
/* Holo for Especiais */
.slot.special-glow::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(110deg,
    rgba(255,215,0,.28) 0%, rgba(255,80,200,.18) 30%,
    rgba(80,200,255,.18) 60%, rgba(255,215,0,.28) 100%);
  background-size: 300% auto;
  animation: holo 2.8s linear infinite;
  mix-blend-mode: overlay;
}
@keyframes holo { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

/* ── SIDEBAR ── */
#sidebar {
  display: flex; flex-direction: column; gap: 12px;
  width: min(210px, 20vw);
  height: min(680px, 86vh);
  flex-shrink: 0;
}

/* Pack button — full width, punchy */
#btn-pack {
  background: linear-gradient(160deg, #e0251a, #8b0000);
  color: #fff; border: none;
  padding: 17px 10px;
  font-family: 'Bebas Neue'; font-size: 1.15rem; letter-spacing: 3px;
  cursor: pointer; border-radius: 6px;
  border-bottom: 5px solid #580000;
  box-shadow: 0 8px 22px rgba(218,41,28,.4);
  transition: .1s; text-align: center; flex-shrink: 0;
}
#btn-pack:active { transform: translateY(3px); border-bottom-width: 2px; box-shadow: none; }

/* Dispenser — dark acrylic box like reference */
#dispenser {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  border-radius: 10px;
  /* Dark burgundy/acrylic look */
  background: linear-gradient(170deg, rgba(70,12,26,.92), rgba(40,5,14,.98));
  border: 1px solid rgba(255,255,255,.1);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -1px 0 rgba(0,0,0,.4),
    0 20px 40px rgba(0,0,0,.6);
  position: relative;
}
/* Acrylic highlight */
#dispenser::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 42%;
  background: linear-gradient(180deg, rgba(255,255,255,.07), transparent);
  border-radius: 10px 10px 0 0;
  pointer-events: none; z-index: 0;
}
.disp-header {
  position: relative; z-index: 1;
  padding: 13px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  text-align: center;
}
.disp-label {
  display: block; font-size: .42rem; font-weight: 900;
  letter-spacing: 6px; color: rgba(255,255,255,.35);
  text-transform: uppercase; margin-bottom: 2px;
}
.disp-title {
  display: block; font-family: 'Bebas Neue';
  font-size: 1.05rem; letter-spacing: 4px;
  color: rgba(255,255,255,.88);
}

#inv-list {
  flex: 1; overflow-y: auto;
  padding: 8px 8px 8px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; z-index: 1;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.08) transparent;
}
.inv-empty {
  color: rgba(255,255,255,.22); font-size: .68rem;
  text-align: center; padding: 24px 8px; line-height: 2.1;
}

/* Inventory card — sticker style */
.inv-card {
  background: #fff;
  border-radius: 3px;
  display: flex; align-items: stretch;
  overflow: hidden;
  cursor: grab;
  box-shadow: 0 3px 10px rgba(0,0,0,.55);
  transition: transform .14s, box-shadow .14s;
  user-select: none; flex-shrink: 0;
  border-left: 4px solid var(--tc, #888);
}
.inv-card:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 7px 18px rgba(0,0,0,.65); }
.inv-card.dragging { opacity: .35; cursor: grabbing; }

.inv-thumb {
  width: 46px; height: 56px;
  flex-shrink: 0;
  background: #f0f0f0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.inv-thumb img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
}
.inv-meta { flex: 1; padding: 5px 7px; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.inv-n { font-family: 'Bebas Neue'; font-size: .9rem; color: #1a1a1a; line-height: 1; }
.inv-t { font-size: .5rem; font-weight: 900; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.inv-badges { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
.badge {
  font-size: .4rem; font-weight: 900; padding: 1px 5px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;
}
.badge-dup { background: rgba(255,140,0,.15); color: #b85000; }
.badge-esp { background: linear-gradient(90deg, #f7971e, #ffd200); color: #333; }

/* ── PACK OVERLAY ── */
#pack-overlay {
  display: none; position: fixed; inset: 0; z-index: 7000;
  background: rgba(6,2,8,.96);
  flex-direction: column; align-items: center; justify-content: center; gap: 28px;
}
#pack-overlay.show { display: flex; }

.envelope {
  width: 180px; height: 248px;
  background: linear-gradient(150deg, #8b2035, #3a0b14);
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  box-shadow: 0 20px 60px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.1);
  animation: env-float 2s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.envelope::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 36%;
  background: linear-gradient(150deg, #a33040, #6b1025);
  border-bottom: 2px dashed rgba(255,255,255,.15);
}
@keyframes env-float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-13px) rotate(2deg); }
}
.env-icon { font-size: 2.4rem; position: relative; z-index: 1; }
.env-text {
  font-family: 'Bebas Neue'; font-size: 1.6rem; letter-spacing: 4px;
  color: rgba(255,255,255,.82); position: relative; z-index: 1;
  text-align: center; line-height: 1;
}
.env-hint {
  color: rgba(255,255,255,.38); font-size: .68rem;
  letter-spacing: 3px; text-transform: uppercase;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }
.envelope.tearing { animation: tear .5s forwards; }
@keyframes tear {
  0% { transform: rotate(-2deg) scale(1); }
  30% { transform: rotate(6deg) scale(1.08); }
  60% { transform: rotate(-8deg) scale(.92); }
  100% { transform: scale(0) translateY(-90px); opacity: 0; }
}

.reveal-row { display: none; flex-wrap: wrap; justify-content: center; gap: 14px; }
.reveal-row.show { display: flex; }
.reveal-card {
  background: #fff; padding: 6px; border-radius: 4px;
  text-align: center;
  box-shadow: 0 16px 36px rgba(0,0,0,.75);
  animation: pop .38s cubic-bezier(.34, 1.56, .64, 1) both;
  display: flex; flex-direction: column; align-items: center;
}
.reveal-card:nth-child(2) { animation-delay: .14s; }
.reveal-card:nth-child(3) { animation-delay: .28s; }
@keyframes pop { from { transform: scale(0) rotate(-12deg); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.reveal-card.rev-special { background: #0c0c1e; border: 2px solid #ffd700; box-shadow: 0 0 24px rgba(255,215,0,.2), 0 16px 36px rgba(0,0,0,.75); }
.reveal-card.rev-special::after { content: '✨ ESPECIAL ✨'; display: block; font-size: .44rem; font-weight: 900; letter-spacing: 2px; color: #ffd700; margin-top: 3px; }
.rev-photo-wrap { width: 104px; height: 136px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.rev-special .rev-photo-wrap { background: #1a1a30; }
.rev-photo { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.rev-num { font-family: 'Bebas Neue'; font-size: 1.1rem; margin-top: 4px; color: #333; }
.rev-special .rev-num { color: #ffd700; }

#btn-collect {
  display: none;
  background: #a3cc3a; color: #111; border: none;
  padding: 14px 40px;
  font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 3px;
  cursor: pointer; border-radius: 4px; border-bottom: 4px solid #6e9020;
  transition: .1s;
}
#btn-collect.show { display: block; }
#btn-collect:active { transform: translateY(3px); border-bottom-width: 1px; }

/* ── TROPHY ── */
#trophy {
  display: none; position: fixed; inset: 0; z-index: 9500;
  background: rgba(0,0,0,.97);
  flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  cursor: pointer;
}
#trophy.show { display: flex; }
.tro-icon { font-size: 5rem; animation: tpop .55s cubic-bezier(.34, 1.56, .64, 1); }
@keyframes tpop { from { transform: scale(0) translateY(50px); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.tro-title { font-family: 'Bebas Neue'; font-size: 2.8rem; color: #a3cc3a; letter-spacing: 6px; }
.tro-msg { background: #fff; padding: 20px 34px; border-radius: 6px; border: 4px solid #ffd700; font-weight: 700; font-size: 1rem; text-align: center; max-width: 440px; color: #222; line-height: 1.5; }
.tro-hint { color: rgba(255,255,255,.28); font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="load-txt">Carregando memórias...</div></div>

<!-- COVER -->
<div id="capa">
  <div class="capa-book">
    <span class="capa-tag">✦ Edição Especial ✦</span>
    <h1 class="capa-title">29 Vezes<br>Em Que<br>Eu Te Vi</h1>
    <div class="capa-rule"></div>
    <p class="capa-sub">Álbum de Figurinhas</p>
    <button class="btn-open" onclick="openAlbum()">Abrir Álbum ✦</button>
  </div>
</div>

<!-- STAGE -->
<div id="stage">
  <div id="book">
    <!-- LEFT -->
    <div id="left">
      <h2 class="page-title" id="page-title">—</h2>
      <div id="left-deco"></div>
      <div id="left-slots"></div>
    </div>
    <!-- RIGHT -->
    <div id="right">
      <canvas id="right-canvas"></canvas>
      <div class="page-counter" id="page-counter">1 / 7</div>
      <div id="right-slots"></div>
      <div id="nav">
        <button class="btn-nav bn-prev" onclick="turn(-1)">← Anterior</button>
        <button class="btn-nav bn-cover" onclick="showCover()">Capa</button>
        <button class="btn-nav bn-next" onclick="turn(1)">Próxima →</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button id="btn-pack" onclick="openPack()">🎁 Abrir Pacote (+3)</button>
    <div id="dispenser">
      <div class="disp-header">
        <span class="disp-label">Dispensário de</span>
        <span class="disp-title">Memórias</span>
      </div>
      <div id="inv-list">
        <div class="inv-empty" id="inv-empty">Abra pacotes para<br>receber figurinhas! 🎴</div>
      </div>
    </div>
  </div>
</div>

<!-- PACK -->
<div id="pack-overlay">
  <div class="envelope" id="envelope" onclick="tearPack()">
    <span class="env-icon">🎴</span>
    <span class="env-text">NOVO<br>PACOTE</span>
  </div>
  <div class="env-hint" id="env-hint">Toque para rasgar o pacote</div>
  <div class="reveal-row" id="reveal-row"></div>
  <button id="btn-collect" onclick="collectStickers()">Guardar Figurinhas ✓</button>
</div>

<!-- TROPHY -->
<div id="trophy" onclick="closeTrophy()">
  <div class="tro-icon">🏆</div>
  <div class="tro-title">Página Completa!</div>
  <div class="tro-msg" id="tro-msg"></div>
  <div class="tro-hint">Toque para continuar</div>
</div>

<script>
// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════
const SHEET = 'https://docs.google.com/spreadsheets/d/1KOgDq-gMhwOH_H9dPVrzTjGB86Is78hZ-0zNn4D6s7E/gviz/tq?tqx=out:json';

// Each theme: background color, geometric palette, slot positions, decoration SVGs
// Slot positions are designed so decorations sit in the GAPS between/around slots
const THEMES = [
  {
    name: 'Comendo',
    bgLeft: '#5c1828',
    palette: ['#da291c','#6c1d33','#e8b800','#fffbf0'],
    themeColor: '#da291c',
    // LEFT: 2 slots — upper-left and lower-left quadrant
    // Decorations fill upper-right, center-right, lower-right
    slotsL: [
      { id:1, top:'12%', left:'3%',  w:'54%', h:'38%', rot:'-1.2deg' },
      { id:2, top:'56%', left:'5%',  w:'50%', h:'34%', rot:'1.4deg'  },
    ],
    // RIGHT: 2 slots stacked
    slotsR: [
      { id:3, top:'8%',  left:'5%',  w:'88%', h:'37%', rot:'-.6deg' },
      { id:4, top:'50%', left:'6%',  w:'86%', h:'37%', rot:'.8deg'  },
    ],
    decos: [
      // Ramen bowl — center-right of left page
      { top:'44%', left:'52%', w:'105px', rot:'-6deg', z:6, svg:`<svg viewBox="0 0 105 78" xmlns="http://www.w3.org/2000/svg"><ellipse cx="52" cy="52" rx="44" ry="19" fill="#c0392b"/><ellipse cx="52" cy="45" rx="44" ry="19" fill="#fff" stroke="#f5c842" stroke-width="2.5"/><ellipse cx="52" cy="45" rx="37" ry="14" fill="#fdeaa8"/><path d="M28 45 Q40 34 52 41 Q64 34 76 45" fill="none" stroke="#e17055" stroke-width="2.5" stroke-linecap="round"/><circle cx="36" cy="43" r="4" fill="#e17055"/><circle cx="52" cy="38" r="4" fill="#27ae60"/><circle cx="68" cy="43" r="4" fill="#e74c3c"/><path d="M42 14 Q44 7 46 14" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/><path d="M56 11 Q58 5 60 11" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/></svg>` },
      // Wine glass — upper-right
      { top:'5%', left:'62%', w:'52px', rot:'9deg', z:6, svg:`<svg viewBox="0 0 52 88" xmlns="http://www.w3.org/2000/svg"><path d="M14 5 Q4 36 18 50 Q26 58 26 60 L26 76 L16 80 L46 80 L36 76 L36 60 Q36 58 44 50 Q58 36 48 5Z" fill="#c0392b" opacity=".85"/><ellipse cx="20" cy="20" rx="5" ry="3" fill="rgba(255,255,255,.3)"/></svg>` },
      // Heart — lower-right

// STATE
// ════════════════════════════════════════════
let stickers = [];
let inv      = JSON.parse(localStorage.getItem('v6_inv')   || '[]');
let glued    = JSON.parse(localStorage.getItem('v6_glued') || '[]');
let page     = 0;
let pending  = [];

// ════════════════════════════════════════════
// LOAD SHEET
// ════════════════════════════════════════════
async function init() {
  try {
    const r   = await fetch(SHEET);
    const txt = await r.text();
    const j   = JSON.parse(txt.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    stickers  = j.table.rows
      .filter(r => r.c[0]?.v != null)
      .map(r => ({
        id:    +r.c[0].v,
        tema:  String(r.c[1]?.v || '').trim(),
        url:   String(r.c[2]?.v || '').trim(),
        texto: String(r.c[3]?.v || '').trim(),
      }));
    document.getElementById('loading').classList.add('gone');
    render();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f87171;font-family:Nunito;text-align:center;padding:30px">
        ⚠️ Erro ao carregar.<br><small style="opacity:.5">${e.message}</small><br><br>
        <small style="opacity:.4">Verifique se a planilha está pública.</small></div>`;
  }
}

// ════════════════════════════════════════════
// COVER
// ════════════════════════════════════════════
function openAlbum() { document.getElementById('capa').classList.add('gone'); }
function showCover() { document.getElementById('capa').classList.remove('gone'); }

// ════════════════════════════════════════════
// CANVAS — geometric pattern right page
// ════════════════════════════════════════════
function drawCanvas(theme) {
  const canvas = document.getElementById('right-canvas');
  const el     = document.getElementById('right');
  const W = el.offsetWidth  || 460;
  const H = el.offsetHeight || 680;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const C   = theme.palette;

  // Fill base
  ctx.fillStyle = C[0];
  ctx.fillRect(0, 0, W, H);

  // Upper 56%: chevron triangles
  const cH  = H * 0.56;
  const sz  = 48;
  for (let row = -1; row <= Math.ceil(cH / sz) + 1; row++) {
    for (let col = -1; col <= Math.ceil(W / sz) + 1; col++) {
      ctx.fillStyle = C[Math.abs((row + col) % C.length)];
      ctx.beginPath();
      ctx.moveTo(col * sz, row * sz);
      ctx.lineTo((col + 1) * sz, row * sz);
      ctx.lineTo(col * sz + sz * .5, row * sz + sz * .55);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Lower 44%: pixel grid
  const px  = 20;
  const sr  = Math.floor(cH / px);
  for (let row = sr; row <= Math.ceil(H / px) + 1; row++) {
    for (let col = 0; col <= Math.ceil(W / px) + 1; col++) {
      ctx.fillStyle = C[Math.abs((row * 3 + col * 2) % C.length)];
      ctx.fillRect(col * px, row * px, px - 1, px - 1);
    }
  }
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render() {
  const T = THEMES[page];

  // Left bg
  document.getElementById('left').style.background = T.bgLeft;
  document.getElementById('page-title').textContent = T.name.toUpperCase();
  document.getElementById('page-counter').textContent = `${page + 1} / ${THEMES.length}`;

  // Canvas
  setTimeout(() => drawCanvas(T), 20);

  // Decorations — behind slots (z:5)
  const deco = document.getElementById('left-deco');
  deco.innerHTML = '';
  T.decos.forEach(d => {
    const wrap = document.createElement('div');
    wrap.style.cssText =
      `position:absolute;top:${d.top};left:${d.left};width:${d.w};` +
      `transform:rotate(${d.rot});z-index:${d.z};pointer-events:none;` +
      `filter:drop-shadow(2px 4px 8px rgba(0,0,0,.38));`;
    wrap.innerHTML = d.svg;
    deco.appendChild(wrap);
  });

  // Slots left
  const sL = document.getElementById('left-slots');
  sL.innerHTML = '';
  T.slotsL.forEach(s => buildSlot(sL, s, T));

  // Slots right
  const sR = document.getElementById('right-slots');
  sR.innerHTML = '';
  T.slotsR.forEach(s => buildSlot(sR, s, T));

  renderInv();
}

// ════════════════════════════════════════════
// BUILD SLOT
// ════════════════════════════════════════════
function buildSlot(container, s, T) {
  const fig    = stickers.find(f => f.id === s.id);
  const filled = glued.includes(s.id);
  const spec   = T.name === 'Especiais';

  const div = document.createElement('div');
  div.className = 'slot' + (filled ? (spec ? ' special-glow' : '') : ' empty-slot');
  div.dataset.id = s.id;
  div.style.cssText =
    `top:${s.top};left:${s.left};width:${s.w};height:${s.h};` +
    `transform:rotate(${s.rot || '0deg'});`;

  if (filled && fig?.url) {
    const img = document.createElement('img');
    img.className = 'slot-photo';
    img.src = fig.url;
    img.alt = '';
    div.appendChild(img);
  } else if (filled) {
    const n = document.createElement('span');
    n.className = 'slot-number'; n.textContent = s.id;
    div.appendChild(n);
  } else {
    const n = document.createElement('span');
    n.className = 'slot-number'; n.textContent = s.id;
    div.appendChild(n);

    div.addEventListener('dragover',  e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (+e.dataTransfer.getData('sid') === s.id) glue(s.id);
    });
    div.addEventListener('click', () => { if (inv.includes(s.id)) glue(s.id); });
  }
  container.appendChild(div);
}

// ════════════════════════════════════════════
// INVENTORY
// ════════════════════════════════════════════
function renderInv() {
  const list  = document.getElementById('inv-list');
  const empty = document.getElementById('inv-empty');
  list.querySelectorAll('.inv-card').forEach(e => e.remove());

  if (!inv.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const cnt = {};
  inv.forEach(id => cnt[id] = (cnt[id] || 0) + 1);
  [...new Set(inv)].forEach(id => {
    const fig  = stickers.find(f => f.id === id);
    if (!fig) return;
    const spec = fig.tema === 'Especiais';
    const q    = cnt[id];
    const T    = THEMES.find(t => t.ids && t.ids.includes(id)) || THEMES.find(t => t.name === fig.tema);
    const tc   = T ? T.themeColor : '#888';

    const card = document.createElement('div');
    card.className = 'inv-card';
    card.style.setProperty('--tc', tc);
    card.draggable = true;
    card.addEventListener('dragstart', e => { e.dataTransfer.setData('sid', id); card.classList.add('dragging'); });
    card.addEventListener('dragend',   () => card.classList.remove('dragging'));

    const tw = document.createElement('div');
    tw.className = 'inv-thumb';
    const img = document.createElement('img');
    img.src = fig.url; img.alt = '';
    tw.appendChild(img);

    const meta = document.createElement('div');
    meta.className = 'inv-meta';
    meta.innerHTML =
      `<div class="inv-n">#${id}</div>` +
      `<div class="inv-t">${fig.tema}</div>` +
      `<div class="inv-badges">` +
      (q > 1 ? `<span class="badge badge-dup">×${q}</span>` : '') +
      (spec   ? `<span class="badge badge-esp">✨ Esp</span>` : '') +
      `</div>`;

    card.append(tw, meta);
    list.appendChild(card);
  });
}

// ════════════════════════════════════════════
// GLUE
// ════════════════════════════════════════════
function glue(id) {
  if (glued.includes(id)) return;
  const i = inv.indexOf(id);
  if (i < 0) return;
  inv.splice(i, 1);
  glued.push(id);
  save();
  render();
  const T = THEMES[page];
  const allIds = [...T.slotsL, ...T.slotsR].map(s => s.id);
  if (allIds.every(i => glued.includes(i))) setTimeout(showTrophy, 700);
}

// ════════════════════════════════════════════
// PACK
// ════════════════════════════════════════════
function openPack() {
  const env = document.getElementById('envelope');
  env.classList.remove('tearing');
  env.style.display = 'flex';
  document.getElementById('env-hint').style.display = 'block';
  const row = document.getElementById('reveal-row');
  row.classList.remove('show'); row.innerHTML = '';
  document.getElementById('btn-collect').classList.remove('show');
  document.getElementById('pack-overlay').classList.add('show');
}

function tearPack() {
  const env = document.getElementById('envelope');
  if (env.classList.contains('tearing')) return;

  const missing = stickers
    .filter(s => !glued.includes(s.id) && !inv.includes(s.id))
    .map(s => s.id);
  const pool = missing.length ? missing : stickers.map(s => s.id);
  const copy = [...pool];
  pending = [];
  for (let i = 0; i < 3; i++) {
    if (!copy.length) break;
    const r = Math.floor(Math.random() * copy.length);
    pending.push(copy.splice(r, 1)[0]);
  }

  env.classList.add('tearing');
  document.getElementById('env-hint').style.display = 'none';
  setTimeout(() => { env.style.display = 'none'; showReveal(); }, 520);
}

function showReveal() {
  const row = document.getElementById('reveal-row');
  row.innerHTML = '';
  pending.forEach(id => {
    const fig  = stickers.find(s => s.id === id);
    if (!fig) return;
    const spec = fig.tema === 'Especiais';
    const card = document.createElement('div');
    card.className = 'reveal-card' + (spec ? ' rev-special' : '');

    const wrap = document.createElement('div'); wrap.className = 'rev-photo-wrap';
    const img  = document.createElement('img');  img.className = 'rev-photo'; img.src = fig.url;
    wrap.appendChild(img);

    const num = document.createElement('div'); num.className = 'rev-num'; num.textContent = '#' + id;
    card.append(wrap, num);
    row.appendChild(card);
  });
  row.classList.add('show');
  document.getElementById('btn-collect').classList.add('show');
}

function collectStickers() {
  pending.forEach(id => inv.push(id));
  save(); renderInv();
  document.getElementById('pack-overlay').classList.remove('show');
  pending = [];
}

// ════════════════════════════════════════════
// TROPHY
// ════════════════════════════════════════════
function showTrophy() {
  const T   = THEMES[page];
  const allIds = [...T.slotsL, ...T.slotsR].map(s => s.id);
  const fig = stickers.find(s => s.id === allIds[0]);
  document.getElementById('tro-msg').textContent = fig?.texto || '🎉 Parabéns!';
  document.getElementById('trophy').classList.add('show');
}
function closeTrophy() { document.getElementById('trophy').classList.remove('show'); }

// ════════════════════════════════════════════
// NAV + SAVE
// ════════════════════════════════════════════
function turn(d) {
  const n = page + d;
  if (n >= 0 && n < THEMES.length) { page = n; render(); }
}
function save() {
  localStorage.setItem('v6_inv',   JSON.stringify(inv));
  localStorage.setItem('v6_glued', JSON.stringify(glued));
}

// Add ids array to each theme for easy lookup
THEMES.forEach(T => { T.ids = [...T.slotsL, ...T.slotsR].map(s => s.id); });

window.addEventListener('load',   init);
window.addEventListener('resize', () => { if (THEMES[page]) drawCanvas(THEMES[page]); });
</script>
</body>
</html>
