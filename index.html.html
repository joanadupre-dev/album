<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29 Vezes Em Que Eu Te Vi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0814;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden;padding:20px}

#loading{position:fixed;inset:0;z-index:9999;background:#1a0814;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:48px;height:48px;border-radius:50%;border:4px solid rgba(255,255,255,.1);border-top-color:#da291c;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:'Bebas Neue';color:rgba(255,255,255,.3);letter-spacing:6px;font-size:.9rem}

#cover{position:fixed;inset:0;z-index:8000;background:radial-gradient(ellipse at 32% 22%,#8b2035,#3d0a15 55%,#1a0508);display:flex;align-items:center;justify-content:center;transition:opacity 1s,transform 1s}
#cover.hide{opacity:0;pointer-events:none;transform:scale(1.05)}
.cover-card{background:#fdf6ec;padding:56px 72px;border:12px solid #a3cc3a;box-shadow:0 0 0 3px #6c1d33,30px 30px 0 rgba(0,0,0,.6);text-align:center;transform:rotate(-1.8deg);position:relative;max-width:460px}
.cover-card::before{content:'';position:absolute;inset:8px;border:2px solid rgba(108,29,51,.18);pointer-events:none}
.cover-tag{display:inline-block;background:#da291c;color:#fff;font-size:.58rem;font-weight:900;letter-spacing:8px;text-transform:uppercase;padding:5px 16px;margin-bottom:22px}
.cover-title{font-family:'Bebas Neue';font-size:5.2rem;color:#6c1d33;line-height:.88}
.cover-line{width:56px;height:4px;background:#a3cc3a;margin:20px auto}
.cover-subtitle{font-size:.68rem;font-weight:900;letter-spacing:5px;color:#bbb;text-transform:uppercase}
.btn-open{display:block;margin:28px auto 0;background:#6c1d33;color:#fff;border:none;padding:16px 54px;font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:4px;cursor:pointer;border-bottom:6px solid #3d0a15;border-right:3px solid #3d0a15;transition:.1s;border-radius:2px}
.btn-open:active{transform:translate(2px,4px);border-bottom-width:2px}

#stage{display:flex;align-items:center;justify-content:center;gap:16px;width:100%;max-width:1400px}

#book{display:flex;height:min(720px,85vh);width:min(960px,70vw);border-radius:4px;box-shadow:-8px 0 24px rgba(0,0,0,.5),8px 0 24px rgba(0,0,0,.5),0 45px 90px rgba(0,0,0,.9);overflow:hidden;position:relative;flex-shrink:0}
#book::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:12px;transform:translateX(-50%);background:linear-gradient(to right,rgba(0,0,0,.03),rgba(0,0,0,.32) 50%,rgba(0,0,0,.03));z-index:150;pointer-events:none}

#page-left{width:50%;height:100%;position:relative;overflow:hidden;padding:32px 28px 24px 32px}
.page-header{position:relative;z-index:20;margin-bottom:8px}
.page-header h2{font-family:'Bebas Neue';font-size:3.8rem;color:#fff;line-height:1;letter-spacing:1px;margin-bottom:4px}
.page-header .subtitle{font-size:.68rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5)}
#deco-layer{position:absolute;inset:0;z-index:5;pointer-events:none}
#slots-left{position:absolute;inset:0;z-index:10}

#page-right{width:50%;height:100%;position:relative;overflow:hidden}
#pattern-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.page-counter{position:absolute;top:20px;right:20px;z-index:20;font-family:'Bebas Neue';font-size:.78rem;letter-spacing:4px;color:rgba(255,255,255,.85)}
#slots-right{position:absolute;inset:0;z-index:10}
.page-nav{position:absolute;bottom:20px;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:center;gap:10px}
.nav-btn{font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;border:none;padding:10px 22px;border-radius:3px;border-bottom:4px solid;cursor:pointer;transition:.1s}
.nav-btn:active{transform:translateY(3px);border-bottom-width:1px}
.nav-prev{background:#0056b8;color:#fff;border-bottom-color:#003a80}
.nav-cover{background:#6c1d33;color:#fff;border-bottom-color:#3d0a15}
.nav-next{background:#a3cc3a;color:#111;border-bottom-color:#72931f}

.slot{position:absolute;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:5px 11px 30px rgba(0,0,0,.6);transition:transform .2s,box-shadow .2s;cursor:pointer}
.slot.empty .slot-number{font-family:'Bebas Neue';color:rgba(0,0,0,.2);font-size:2rem;user-select:none}
.slot.filled img{width:100%;height:100%;object-fit:contain;padding:6px;display:block;background:#fff}
.slot.drag-over{box-shadow:0 0 0 4px #a3cc3a,5px 11px 30px rgba(0,0,0,.6)!important;transform:scale(1.03) rotate(0deg)!important}
.slot.special-holo::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,rgba(255,215,0,.32) 0%,rgba(255,80,200,.2) 35%,rgba(80,220,255,.2) 65%,rgba(255,215,0,.32) 100%);background-size:300% auto;animation:hologram 3s linear infinite;mix-blend-mode:overlay}
@keyframes hologram{0%{background-position:0% center}100%{background-position:300% center}}

.decoration{position:absolute;pointer-events:none;filter:drop-shadow(3px 5px 10px rgba(0,0,0,.4))}

#sidebar{display:flex;flex-direction:column;gap:14px;width:min(230px,22vw);height:min(720px,85vh);flex-shrink:0}
#btn-open-pack{background:linear-gradient(145deg,#e0251a,#8b0000);color:#fff;border:none;padding:18px 12px;font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:3px;cursor:pointer;border-radius:6px;border-bottom:5px solid #5c0000;box-shadow:0 10px 26px rgba(218,41,28,.42);transition:.1s;text-align:center;flex-shrink:0}
#btn-open-pack:active{transform:translateY(3px);border-bottom-width:2px;box-shadow:none}
#dispenser{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;background:linear-gradient(165deg,rgba(80,14,30,.9),rgba(45,6,16,.96));border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 0 rgba(0,0,0,.35),0 22px 44px rgba(0,0,0,.65);position:relative}
#dispenser::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);border-radius:12px 12px 0 0;pointer-events:none;z-index:0}
.dispenser-header{position:relative;z-index:1;padding:14px 12px 12px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.dispenser-label{display:block;font-size:.44rem;font-weight:900;letter-spacing:6px;color:rgba(255,255,255,.38);text-transform:uppercase;margin-bottom:2px}
.dispenser-title{display:block;font-family:'Bebas Neue';font-size:1.15rem;letter-spacing:4px;color:rgba(255,255,255,.92)}
#inventory-list{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:7px;position:relative;z-index:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.inventory-empty{color:rgba(255,255,255,.24);font-size:.72rem;text-align:center;padding:28px 10px;line-height:2.2}
.inventory-card{background:#fff;border-radius:3px;display:flex;align-items:stretch;overflow:hidden;cursor:grab;box-shadow:0 4px 12px rgba(0,0,0,.6);transition:transform .15s,box-shadow .15s;user-select:none;flex-shrink:0;border-left:4px solid var(--theme-color,#888)}
.inventory-card:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 20px rgba(0,0,0,.7)}
.inventory-card.dragging{opacity:.4;cursor:grabbing}
.inventory-thumb{width:50px;height:62px;flex-shrink:0;background:#f2f2f2;display:flex;align-items:center;justify-content:center;overflow:hidden}
.inventory-thumb img{width:100%;height:100%;object-fit:contain;display:block}
.inventory-info{flex:1;padding:6px 8px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.inventory-number{font-family:'Bebas Neue';font-size:.95rem;color:#1a1a1a;line-height:1}
.inventory-theme{font-size:.52rem;font-weight:900;color:#999;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inventory-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{font-size:.42rem;font-weight:900;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.badge-duplicate{background:rgba(255,150,0,.16);color:#c96000}
.badge-special{background:linear-gradient(90deg,#f7971e,#ffd200);color:#333}

#pack-overlay{display:none;position:fixed;inset:0;z-index:7500;background:rgba(6,2,10,.97);flex-direction:column;align-items:center;justify-content:center;gap:30px}
#pack-overlay.active{display:flex}
.envelope{width:200px;height:270px;background:linear-gradient(150deg,#8b2035,#3d0a15);border-radius:8px;border:2px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;box-shadow:0 22px 65px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.12);animation:envelope-float 2.4s ease-in-out infinite;position:relative;overflow:hidden}
.envelope::before{content:'';position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(150deg,#a33040,#6b1025);border-bottom:2px dashed rgba(255,255,255,.18)}
@keyframes envelope-float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-15px) rotate(2deg)}}
.envelope-icon{font-size:2.6rem;position:relative;z-index:1}
.envelope-label{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:4px;color:rgba(255,255,255,.86);position:relative;z-index:1;text-align:center;line-height:1}
.envelope-hint{color:rgba(255,255,255,.4);font-size:.72rem;letter-spacing:3px;text-transform:uppercase;animation:blink-hint 2s ease-in-out infinite}
@keyframes blink-hint{0%,100%{opacity:.3}50%{opacity:1}}
.envelope.tearing{animation:tear-envelope .52s forwards}
@keyframes tear-envelope{0%{transform:rotate(-2deg) scale(1)}30%{transform:rotate(6deg) scale(1.08)}60%{transform:rotate(-9deg) scale(.92)}100%{transform:scale(0) rotate(0) translateY(-85px);opacity:0}}
.reveal-cards{display:none;flex-wrap:wrap;justify-content:center;gap:16px}
.reveal-cards.active{display:flex}
.reveal-card{background:#fff;padding:6px;border-radius:4px;text-align:center;box-shadow:0 20px 42px rgba(0,0,0,.8);animation:pop-card .4s cubic-bezier(.34,1.56,.64,1) both}
.reveal-card:nth-child(2){animation-delay:.16s}
.reveal-card:nth-child(3){animation-delay:.32s}
@keyframes pop-card{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.reveal-card.special-card{background:#0d0d20;border:2px solid #ffd700;box-shadow:0 0 28px rgba(255,215,0,.24),0 20px 42px rgba(0,0,0,.8)}
.reveal-card.special-card::after{content:'✨ ESPECIAL ✨';display:block;font-size:.48rem;font-weight:900;letter-spacing:2px;color:#ffd700;margin-top:4px}
.reveal-photo-wrap{width:115px;height:148px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.special-card .reveal-photo-wrap{background:#1a1a30}
.reveal-photo{max-width:100%;max-height:100%;object-fit:contain;display:block}
.reveal-number{font-family:'Bebas Neue';font-size:1.2rem;margin-top:5px;color:#333}
.special-card .reveal-number{color:#ffd700}
#btn-collect{display:none;background:#a3cc3a;color:#111;border:none;padding:15px 44px;font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:3px;cursor:pointer;border-radius:4px;border-bottom:4px solid #72931f;transition:.1s}
#btn-collect.active{display:block}
#btn-collect:active{transform:translateY(3px);border-bottom-width:1px}

#trophy-modal{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.98);flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer}
#trophy-modal.active{display:flex}
.trophy-icon{font-size:6rem;animation:trophy-pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes trophy-pop{from{transform:scale(0) translateY(60px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.trophy-title{font-family:'Bebas Neue';font-size:3.2rem;color:#a3cc3a;letter-spacing:6px}
.trophy-message{background:#fff;padding:24px 38px;border-radius:6px;border:4px solid #ffd700;font-weight:700;font-size:1.08rem;text-align:center;max-width:480px;color:#222;line-height:1.6}
.trophy-hint{color:rgba(255,255,255,.3);font-size:.68rem;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-text">Carregando memórias...</div>
</div>

<div id="cover">
  <div class="cover-card">
    <span class="cover-tag">✦ Edição Especial ✦</span>
    <h1 class="cover-title">29 Vezes<br>Em Que<br>Eu Te Vi</h1>
    <div class="cover-line"></div>
    <p class="cover-subtitle">Álbum de Figurinhas</p>
    <button class="btn-open" onclick="openAlbum()">Abrir Álbum ✦</button>
  </div>
</div>

<div id="stage">
  <div id="book">
    <div id="page-left">
      <div class="page-header">
        <h2 id="page-title">—</h2>
        <div class="subtitle" id="page-subtitle">—</div>
      </div>
      <div id="deco-layer"></div>
      <div id="slots-left"></div>
    </div>
    <div id="page-right">
      <canvas id="pattern-canvas"></canvas>
      <div class="page-counter" id="page-counter">1 / 7</div>

      <div class="page-nav">
        <button class="nav-btn nav-prev" onclick="navigatePage(-1)">← Anterior</button>

        <button class="nav-btn nav-next" onclick="navigatePage(1)">Próxima →</button>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <button id="btn-open-pack" onclick="openPackOverlay()">🎁 Abrir Pacote (+3)</button>
    <div id="dispenser">
      <div class="dispenser-header">
        <span class="dispenser-label">Dispensário de</span>
        <span class="dispenser-title">Memórias</span>
      </div>
      <div id="inventory-list">
        <div class="inventory-empty" id="inventory-empty">Abra pacotes para<br>receber figurinhas! 🎴</div>
      </div>
    </div>
  </div>
</div>

<div id="pack-overlay">
  <div class="envelope" id="envelope" onclick="tearEnvelope()">
    <span class="envelope-icon">🎴</span>
    <span class="envelope-label">NOVO<br>PACOTE</span>
  </div>
  <div class="envelope-hint" id="envelope-hint">Toque para rasgar o pacote</div>
  <div class="reveal-cards" id="reveal-cards"></div>
  <button id="btn-collect" onclick="collectStickers()">Guardar Figurinhas ✓</button>
</div>

<div id="trophy-modal" onclick="closeTrophy()">
  <div class="trophy-icon">🏆</div>
  <div class="trophy-title">Página Completa!</div>
  <div class="trophy-message" id="trophy-message"></div>
  <div class="trophy-hint">Toque para continuar</div>
</div>

let allStickers=[],inventory=JSON.parse(localStorage.getItem('album_v8_inv')||'[]'),gluedStickers=JSON.parse(localStorage.getItem('album_v8_glued')||'[]'),currentPage=0,pendingStickers=[];
async function loadSheet(){try{const r=await fetch(SHEET_URL),t=await r.text(),j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));allStickers=j.table.rows.filter(r=>r.c[0]?.v!=null).map(r=>({id:Number(r.c[0].v),theme:String(r.c[1]?.v||'').trim(),url:String(r.c[2]?.v||'').trim(),voucher:String(r.c[3]?.v||'').trim()}));document.getElementById('loading').classList.add('hide');renderCurrentPage()}catch(e){console.error('Erro:',e);document.getElementById('loading').innerHTML='<div style="color:#f87171;text-align:center;padding:30px"><div style="font-size:2rem">⚠️</div><strong>Erro ao carregar</strong><br><small>'+e.message+'</small></div>'}}
function openAlbum(){document.getElementById('cover').classList.add('hide')}
function showCover(){document.getElementById('cover').classList.remove('hide')}
function drawGeometricPattern(theme){const c=document.getElementById('pattern-canvas'),container=document.getElementById('page-right'),w=container.offsetWidth||480,h=container.offsetHeight||720;c.width=w;c.height=h;const ctx=c.getContext('2d'),colors=theme.palette;ctx.fillStyle=colors[0];ctx.fillRect(0,0,w,h);const ch=h*.6,ts=48;for(let row=-1;row<=Math.ceil(ch/ts)+1;row++){for(let col=-1;col<=Math.ceil(w/ts)+1;col++){ctx.fillStyle=colors[Math.abs((row+col)%colors.length)];ctx.beginPath();ctx.moveTo(col*ts,row*ts);ctx.lineTo((col+1)*ts,row*ts);ctx.lineTo(col*ts+ts*.5,row*ts+ts*.56);ctx.closePath();ctx.fill()}}const ps=20,sr=Math.floor(ch/ps);for(let row=sr;row<=Math.ceil(h/ps)+1;row++){for(let col=0;col<=Math.ceil(w/ps)+1;col++){ctx.fillStyle=colors[Math.abs((row*3+col*2)%colors.length)];ctx.fillRect(col*ps,row*ps,ps-1,ps-1)}}}
function renderCurrentPage(){const theme=THEMES[currentPage];document.getElementById('page-left').style.backgroundColor=theme.bgColor;document.getElementById('page-title').textContent=theme.name.toUpperCase();document.getElementById('page-subtitle').textContent=theme.subtitle;document.getElementById('page-counter').textContent=`${currentPage+1} / ${THEMES.length}`;setTimeout(()=>drawGeometricPattern(theme),30);const decoLayer=document.getElementById('deco-layer');decoLayer.innerHTML='';theme.decorations.forEach(deco=>{const div=document.createElement('div');div.className='decoration';div.style.cssText=`top:${deco.top};left:${deco.left};width:${deco.width};transform:rotate(${deco.rotation});`;div.innerHTML=deco.svg;decoLayer.appendChild(div)});const slotsLeft=document.getElementById('slots-left'),slotsRight=document.getElementById('slots-right');slotsLeft.innerHTML='';slotsRight.innerHTML='';theme.slotsLeft.forEach(slot=>createSlot(slotsLeft,slot,theme));theme.slotsRight.forEach(slot=>createSlot(slotsRight,slot,theme));renderInventory()}
function createSlot(container,slotConfig,theme){const sticker=allStickers.find(s=>s.id===slotConfig.id),isGlued=gluedStickers.includes(slotConfig.id),isSpecial=theme.name==='Especiais',slot=document.createElement('div');slot.className='slot'+(isGlued?' filled':' empty')+(isGlued&&isSpecial?' special-holo':'');slot.dataset.slotId=slotConfig.id;slot.style.cssText=`top:${slotConfig.top};left:${slotConfig.left};width:${slotConfig.width};height:${slotConfig.height};transform:rotate(${slotConfig.rotation});`;if(isGlued&&sticker?.url){const img=document.createElement('img');img.src=sticker.url;img.alt=`Figurinha ${slotConfig.id}`;slot.appendChild(img)}else{const num=document.createElement('span');num.className='slot-number';num.textContent=slotConfig.id;slot.appendChild(num);if(!isGlued){slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over')});slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drag-over');const draggedId=parseInt(e.dataTransfer.getData('stickerId'));if(draggedId===slotConfig.id)glueSticker(slotConfig.id)});slot.addEventListener('click',()=>{if(inventory.includes(slotConfig.id))glueSticker(slotConfig.id)})}}container.appendChild(slot)}
function renderInventory(){const list=document.getElementById('inventory-list'),emptyMsg=document.getElementById('inventory-empty');list.querySelectorAll('.inventory-card').forEach(card=>card.remove());if(inventory.length===0){emptyMsg.style.display='block';return}emptyMsg.style.display='none';const counts={};inventory.forEach(id=>{counts[id]=(counts[id]||0)+1});[...new Set(inventory)].forEach(stickerId=>{const sticker=allStickers.find(s=>s.id===stickerId);if(!sticker)return;const theme=THEMES.find(t=>t.ids.includes(stickerId)),isSpecial=sticker.theme==='Especiais',count=counts[stickerId],card=document.createElement('div');card.className='inventory-card';card.style.setProperty('--theme-color',theme?.themeColor||'#888');card.draggable=true;card.addEventListener('dragstart',e=>{e.dataTransfer.setData('stickerId',stickerId);card.classList.add('dragging')});card.addEventListener('dragend',()=>card.classList.remove('dragging'));const thumb=document.createElement('div');thumb.className='inventory-thumb';const img=document.createElement('img');img.src=sticker.url;img.alt=`#${stickerId}`;thumb.appendChild(img);const info=document.createElement('div');info.className='inventory-info';info.innerHTML=`<div class="inventory-number">#${stickerId}</div><div class="inventory-theme">${sticker.theme}</div><div class="inventory-badges">`+(count>1?`<span class="badge badge-duplicate">×${count}</span>`:'')+(isSpecial?`<span class="badge badge-special">✨ Esp</span>`:'')+'</div>';card.appendChild(thumb);card.appendChild(info);list.appendChild(card)})}
function glueSticker(stickerId){if(gluedStickers.includes(stickerId))return;const index=inventory.indexOf(stickerId);if(index===-1)return;inventory.splice(index,1);gluedStickers.push(stickerId);saveToStorage();renderCurrentPage();const theme=THEMES[currentPage],allPageIds=[...theme.slotsLeft,...theme.slotsRight].map(s=>s.id);if(allPageIds.every(id=>gluedStickers.includes(id)))setTimeout(showTrophy,700)}
function openPackOverlay(){const envelope=document.getElementById('envelope');envelope.classList.remove('tearing');envelope.style.display='flex';document.getElementById('envelope-hint').style.display='block';const revealCards=document.getElementById('reveal-cards');revealCards.classList.remove('active');revealCards.innerHTML='';document.getElementById('btn-collect').classList.remove('active');document.getElementById('pack-overlay').classList.add('active')}
function tearEnvelope(){const envelope=document.getElementById('envelope');if(envelope.classList.contains('tearing'))return;const missingStickers=allStickers.filter(s=>!gluedStickers.includes(s.id)&&!inventory.includes(s.id)).map(s=>s.id),pool=missingStickers.length>0?missingStickers:allStickers.map(s=>s.id),poolCopy=[...pool];pendingStickers=[];for(let i=0;i<3;i++){if(poolCopy.length===0)break;const randomIndex=Math.floor(Math.random()*poolCopy.length);pendingStickers.push(poolCopy.splice(randomIndex,1)[0])}envelope.classList.add('tearing');document.getElementById('envelope-hint').style.display='none';setTimeout(()=>{envelope.style.display='none';showRevealCards()},520)}
function showRevealCards(){const revealCards=document.getElementById('reveal-cards');revealCards.innerHTML='';pendingStickers.forEach(stickerId=>{const sticker=allStickers.find(s=>s.id===stickerId);if(!sticker)return;const isSpecial=sticker.theme==='Especiais',card=document.createElement('div');card.className='reveal-card'+(isSpecial?' special-card':'');const photoWrap=document.createElement('div');photoWrap.className='reveal-photo-wrap';const img=document.createElement('img');img.className='reveal-photo';img.src=sticker.url;img.alt=`#${stickerId}`;photoWrap.appendChild(img);const number=document.createElement('div');number.className='reveal-number';number.textContent=`#${stickerId}`;card.appendChild(photoWrap);card.appendChild(number);revealCards.appendChild(card)});revealCards.classList.add('active');document.getElementById('btn-collect').classList.add('active')}
function collectStickers(){pendingStickers.forEach(id=>inventory.push(id));saveToStorage();renderInventory();document.getElementById('pack-overlay').classList.remove('active');pendingStickers=[]}
function showTrophy(){const theme=THEMES[currentPage],firstStickerId=[...theme.slotsLeft,...theme.slotsRight][0].id,sticker=allStickers.find(s=>s.id===firstStickerId);document.getElementById('trophy-message').textContent=sticker?.voucher||'🎉 Parabéns!';document.getElementById('trophy-modal').classList.add('active')}
function closeTrophy(){document.getElementById('trophy-modal').classList.remove('active')}
function navigatePage(direction){const newPage=currentPage+direction;if(newPage>=0&&newPage<THEMES.length){currentPage=newPage;renderCurrentPage()}}
function saveToStorage(){localStorage.setItem('album_v8_inv',JSON.stringify(inventory));localStorage.setItem('album_v8_glued',JSON.stringify(gluedStickers))}
window.addEventListener('load',loadSheet);
window.addEventListener('resize',()=>{if(THEMES[currentPage])drawGeometricPattern(THEMES[currentPage])});
